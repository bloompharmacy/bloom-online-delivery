<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Bloom Online — Handover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bloom:#b22025; --bloom-dark:#8b191d; --bloom-light:#fdf2f2;
      --bg:#f6f6f8; --surface:#ffffff; --border:#e5e7eb;
      --text:#1a1a2e; --muted:#6b7280;
      --success:#16a34a; --error:#dc2626; --info:#2563eb; --warning:#d97706;
      --radius:12px; --radius-lg:20px; --radius-full:100px;
      --shadow:0 2px 12px rgba(0,0,0,0.07); --shadow-md:0 4px 20px rgba(0,0,0,0.10);
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:60px; -webkit-tap-highlight-color:transparent; }

    /* ── Login ── */
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card { background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); padding:40px 32px; width:100%; max-width:380px; text-align:center; }
    .login-logo-wrap { margin:0 auto 20px; }
    .login-logo-img { width:140px; height:auto; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(178,32,37,.18)); }
    .login-badge { display:inline-flex; align-items:center; gap:6px; background:var(--bloom-light); color:var(--bloom); font-size:11px; font-weight:700; padding:4px 12px; border-radius:var(--radius-full); margin-bottom:14px; letter-spacing:.4px; }
    .login-card h1 { font-family:'Sora',sans-serif; font-size:22px; font-weight:700; margin-bottom:6px; }
    .login-card p { color:var(--muted); font-size:14px; margin-bottom:28px; }
    .pin-input { width:100%; padding:16px; font-size:24px; letter-spacing:8px; text-align:center; border:2px solid var(--border); border-radius:var(--radius-full); outline:none; font-family:'Sora',sans-serif; transition:border-color .2s; }
    .pin-input:focus { border-color:var(--bloom); box-shadow:0 0 0 3px rgba(178,32,37,.10); }
    .btn-primary { width:100%; padding:16px; background:var(--bloom); color:#fff; border:none; border-radius:var(--radius-full); font-family:'Sora',sans-serif; font-size:15px; font-weight:600; cursor:pointer; margin-top:14px; box-shadow:0 4px 16px rgba(178,32,37,.25); transition:background .2s; }
    .btn-primary:hover { background:var(--bloom-dark); }
    .error-msg { color:var(--error); font-size:13px; margin-top:12px; display:none; font-weight:500; }

    /* ── Top bar ── */
    #main-app { display:none; }
    .top-bar { background:var(--surface); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow); position:sticky; top:0; z-index:100; }
    .top-bar-left { display:flex; align-items:center; gap:10px; }
    .top-bar-logo { width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
    .top-bar-logo img { width:36px; height:36px; object-fit:contain; border-radius:8px; }
    .top-bar-user { font-family:'Sora',sans-serif; font-size:14px; font-weight:600; }
    .top-bar-sub { font-size:11px; color:var(--bloom); font-weight:600; margin-top:1px; }
    .top-bar-tag { font-size:11px; color:var(--muted); margin-top:1px; }
    .btn-logout { padding:8px 16px; background:transparent; border:1.5px solid var(--border); border-radius:var(--radius-full); font-size:13px; color:var(--muted); cursor:pointer; transition:border-color .2s,color .2s; }
    .btn-logout:hover { border-color:var(--error); color:var(--error); }

    /* ── Tabs ── */
    .tabs { display:flex; gap:6px; padding:16px 16px 0; max-width:640px; margin:0 auto; }
    .tab-btn { flex:1; padding:12px; border:none; border-radius:var(--radius) var(--radius) 0 0; background:var(--surface); color:var(--muted); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; opacity:.6; }
    .tab-btn.active { opacity:1; color:var(--bloom); border-bottom:2px solid var(--bloom); }

    /* ── Container / Card ── */
    .container { max-width:640px; margin:0 auto; padding:0 16px 16px; }
    .card { background:var(--surface); border-radius:0 0 var(--radius-lg) var(--radius-lg); box-shadow:var(--shadow); padding:20px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
    .field select, .field input[type="text"] { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:15px; font-family:'DM Sans',sans-serif; color:var(--text); background:var(--surface); outline:none; appearance:none; transition:border-color .2s; }
    .field select:focus, .field input[type="text"]:focus { border-color:var(--bloom); box-shadow:0 0 0 3px rgba(178,32,37,.08); }

    /* ── Operational Zone Picker ── */
    .op-zone-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .op-zone-picker { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .op-zone-btn { padding:10px 16px; border:2px solid var(--border); border-radius:var(--radius); background:var(--surface); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; color:var(--muted); transition:all .15s; }
    .op-zone-btn:hover { border-color:var(--bloom); color:var(--bloom); background:var(--bloom-light); }
    .op-zone-btn.active { background:var(--bloom); border-color:var(--bloom); color:#fff; box-shadow:0 2px 8px rgba(178,32,37,.25); }
    .op-zone-empty { font-size:13px; color:var(--muted); padding:12px; text-align:center; background:var(--bg); border-radius:var(--radius); border:1.5px dashed var(--border); }

    /* ── Divider ── */
    .divider { display:flex; align-items:center; gap:10px; margin:18px 0 16px; }
    .divider span { font-size:12px; color:var(--muted); white-space:nowrap; font-weight:500; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Scanner ── */
    .add-order-panel { background:var(--bg); border-radius:var(--radius-lg); border:1.5px solid var(--border); padding:16px; margin-bottom:18px; }
    .scanner-wrap { position:relative; width:100%; aspect-ratio:16/9; background:#111; border-radius:var(--radius); overflow:hidden; margin-bottom:12px; display:none; }
    #video-feed { width:100%; height:100%; object-fit:cover; display:block; }
    .scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .scan-box { width:72%; height:44%; border:2px solid var(--bloom); border-radius:var(--radius); box-shadow:0 0 0 9999px rgba(0,0,0,.52); position:relative; overflow:hidden; }
    .scan-line { position:absolute; left:0; right:0; height:2px; background:var(--bloom); animation:scanAnim 2s ease-in-out infinite; }
    @keyframes scanAnim { 0%,100%{top:8%} 50%{top:88%} }

    /* ── Input row & buttons ── */
    .order-id-input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; background:var(--surface); height:48px; transition:border-color .2s; margin-bottom:8px; }
    .order-id-input:focus { border-color:var(--bloom); box-shadow:0 0 0 3px rgba(178,32,37,.08); }
    .order-id-input.scanned { border-color:var(--success); background:#f0fdf4; font-weight:600; color:#15803d; }
    .btn-row-3 { display:flex; gap:8px; }
    .btn-cam { flex:1; height:44px; background:var(--text); color:#fff; border:none; border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; transition:background .2s; }
    .btn-cam::after { content:'Scan'; }
    .btn-cam svg { width:18px; height:18px; flex-shrink:0; }
    .btn-cam.cam-on { background:var(--bloom); }
    .btn-flash { flex:1; height:44px; background:var(--surface); color:var(--muted); border:1.5px solid var(--border); border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; opacity:.35; pointer-events:none; transition:background .2s; }
    .btn-flash::after { content:'Flash'; }
    .btn-flash svg { width:16px; height:16px; }
    .btn-flash.visible { opacity:1; pointer-events:auto; }
    .btn-flash.on { background:#fef3c7; border-color:#f59e0b; color:#92400e; }
    .btn-clear-input { flex:1; height:44px; background:#fee2e2; color:var(--error); border:1.5px solid #fca5a5; border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; transition:background .2s; }
    .btn-clear-input::after { content:'Clear'; }
    .btn-clear-input:hover { background:#fecaca; }
    .btn-add { width:100%; height:48px; margin-top:12px; background:var(--info); color:#fff; border:none; border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:background .2s; }
    .btn-add:hover:not(:disabled) { background:#1d4ed8; }
    .btn-add:disabled { background:var(--muted); cursor:not-allowed; }

    /* ── Order list ── */
    .list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .list-title { font-family:'Sora',sans-serif; font-size:14px; font-weight:600; }
    .count-badge { background:var(--bloom-light); color:var(--bloom); font-size:12px; font-weight:700; padding:2px 10px; border-radius:var(--radius-full); margin-right:4px; }
    .btn-clear-list { background:none; border:none; color:var(--error); font-size:13px; cursor:pointer; font-weight:500; }
    .order-list { max-height:280px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    .order-item { display:flex; justify-content:space-between; align-items:center; padding:11px 14px; background:var(--bg); border-radius:var(--radius); border:1px solid var(--border); animation:fadeIn .15s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .order-item-left { display:flex; flex-direction:column; gap:4px; }
    .order-item-id { font-size:14px; font-weight:600; font-family:monospace; }
    .zone-pill { display:inline-block; padding:2px 9px; border-radius:var(--radius-full); font-size:11px; font-weight:700; background:#e0e7ff; color:#3730a3; }
    .btn-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; padding:0 4px; transition:color .2s; }
    .btn-remove:hover { color:var(--error); }

    /* ── Notes & Submit ── */
    .notes-input { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; margin-bottom:16px; transition:border-color .2s; resize:none; }
    .notes-input:focus { border-color:var(--bloom); }
    .btn-submit { width:100%; padding:18px; background:var(--success); color:#fff; border:none; border-radius:var(--radius-full); font-family:'Sora',sans-serif; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(22,163,74,.25); transition:background .2s; }
    .btn-submit:hover:not(:disabled) { background:#15803d; }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }

    /* ── History ── */
    .filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .filter-grid input, .filter-grid select { width:100%; padding:11px 12px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:13px; font-family:'DM Sans',sans-serif; outline:none; background:var(--surface); transition:border-color .2s; }
    .filter-grid input:focus, .filter-grid select:focus { border-color:var(--bloom); }
    .filter-search { display:flex; gap:8px; margin-bottom:12px; }
    .filter-search input { flex:1; padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:13px; font-family:'DM Sans',sans-serif; outline:none; background:var(--surface); }
    .filter-search input:focus { border-color:var(--bloom); }
    .btn-search { padding:0 20px; background:var(--info); color:#fff; border:none; border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-clear-history { padding:0 16px; background:#f3f4f6; color:var(--muted); border:1.5px solid var(--border); border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:background .2s; }
    .btn-clear-history:hover { background:#e5e7eb; color:var(--error); border-color:var(--error); }
    .history-actions { display:flex; gap:8px; margin-bottom:14px; }

    /* History items */
    .history-item { padding:13px; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); border-left:4px solid var(--bloom); margin-bottom:8px; }
    .history-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .history-id { font-weight:700; font-size:14px; font-family:monospace; }
    .status-badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:var(--radius-full); }
    .s-handed   { background:#dbeafe; color:#1e40af; }
    .s-delivered{ background:#d1fae5; color:#065f46; }
    .s-audited  { background:#ede9fe; color:#5b21b6; }
    .s-returned { background:#fee2e2; color:#991b1b; }
    .history-meta { font-size:12px; color:var(--muted); margin-top:5px; line-height:1.7; }
    .history-meta .op-zone-tag { display:inline-block; background:#e0e7ff; color:#3730a3; font-size:11px; font-weight:700; padding:1px 7px; border-radius:var(--radius-full); margin-left:4px; }
    .history-meta .batch-tag { display:inline-block; background:#f3f4f6; color:var(--muted); font-size:10px; font-weight:600; padding:1px 7px; border-radius:var(--radius-full); margin-left:4px; font-family:monospace; }
    .btn-delete-order { background:none; border:none; cursor:pointer; font-size:16px; padding:2px 4px; opacity:.5; transition:opacity .2s; color:var(--error); }
    .btn-delete-order:hover { opacity:1; }
    .history-summary-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:8px 12px; background:var(--bg); border-radius:var(--radius); font-size:13px; }
    .history-summary-bar span { font-weight:600; color:var(--muted); }
    .history-summary-bar b { color:var(--text); }

    /* ── Shared ── */
    .tab-panel { display:none; } .tab-panel.active { display:block; }
    .empty-state { text-align:center; padding:32px 16px; color:var(--muted); font-size:14px; }
    .loader-overlay { position:fixed; inset:0; background:rgba(255,255,255,.88); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    .loader-overlay.show { display:flex; }
    .spinner { width:44px; height:44px; border:3px solid var(--border); border-top-color:var(--bloom); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loader-text { margin-top:14px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; color:var(--muted); }
    .toast-wrap { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; width:90%; max-width:380px; }
    .toast { padding:13px 20px; border-radius:var(--radius-full); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; color:#fff; text-align:center; animation:tIn .25s ease, tOut .3s ease 2.7s forwards; }
    .toast.success{background:var(--success)} .toast.error{background:var(--error)} .toast.info{background:var(--info)} .toast.warning{background:var(--warning)}
    @keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes tOut{to{opacity:0;transform:translateY(10px)}}

    @media (max-width:480px) {
      .login-card { padding:32px 20px; }
      .filter-grid { grid-template-columns:1fr; }
      .btn-row-3 { gap:6px; }
      .op-zone-btn { font-size:12px; padding:8px 12px; }
    }
  </style>
</head>
<body>

<div class="loader-overlay" id="loader"><div class="spinner"></div><div class="loader-text" id="loader-text">Loading...</div></div>
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ── Login ──────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="https://bloompharmacy.github.io/bloom-delivery/B-big-logo.png" alt="Bloom" class="login-logo-img">
    </div>
    <div class="login-badge">🌐 Online Store</div>
    <h1>Bloom Online — Handover</h1>
    <p>Enter your passcode to continue</p>
    <input type="password" class="pin-input" id="passcode-input"
           inputmode="numeric" maxlength="10" placeholder="••••"
           autocomplete="one-time-code" data-form-type="other" name="passcode-otp">
    <button class="btn-primary" id="unlock-btn">Unlock</button>
    <div class="error-msg" id="login-error">Invalid passcode. Please try again.</div>
  </div>
</div>

<!-- ── Main App ───────────────────────────────────────────────────────────── -->
<div id="main-app">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">
        <img src="https://bloompharmacy.github.io/bloom-delivery/B-big-logo.png" alt="Bloom">
      </div>
      <div>
        <div class="top-bar-user" id="display-user"></div>
        <div class="top-bar-sub">Online Handover</div>
      </div>
    </div>
    <button class="btn-logout" id="logout-btn">Logout</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-scan-btn">📦 New Handover</button>
    <button class="tab-btn" id="tab-history-btn">🕐 History</button>
  </div>

  <div class="container">
    <div class="card">

      <!-- ── New Handover Tab ─────────────────────────────────────────── -->
      <div class="tab-panel active" id="tab-scan">

        <div class="field">
          <label>Delivery Agent</label>
          <select id="agent-select"><option value="">— Select agent —</option></select>
        </div>

        <div class="field">
          <div class="op-zone-label">Operational Zone</div>
          <div id="op-zone-picker" class="op-zone-picker">
            <div class="op-zone-empty">Loading zones…</div>
          </div>
        </div>

        <div class="divider"><span>Add orders</span></div>

        <div class="add-order-panel">
          <div class="scanner-wrap" id="scanner-wrap">
            <video id="video-feed" autoplay playsinline muted></video>
            <div class="scan-overlay"><div class="scan-box"><div class="scan-line"></div></div></div>
          </div>
          <input type="text" inputmode="numeric" class="order-id-input" id="order-id-input"
                 placeholder="Order ID…" autocomplete="off">
          <div class="btn-row-3">
            <button class="btn-cam" id="btn-cam" title="Camera">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
              </svg>
            </button>
            <button class="btn-flash" id="btn-flash" title="Flash">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            </button>
            <button class="btn-clear-input" id="btn-clear-input" title="Clear">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <button class="btn-add" id="btn-add" disabled>＋ Add to List</button>
        </div>

        <div class="list-header">
          <div class="list-title">
            <span class="count-badge" id="count">0</span> Orders
          </div>
          <button class="btn-clear-list" id="btn-clear">Clear all</button>
        </div>
        <div class="order-list" id="order-list">
          <div class="empty-state">No orders added yet</div>
        </div>

        <div class="field">
          <label>Notes (optional)</label>
          <textarea class="notes-input" id="notes-input" rows="2" placeholder="Run-sheet notes…"></textarea>
        </div>

        <button class="btn-submit" id="btn-submit" disabled>Complete Handover ✓</button>
      </div>

      <!-- ── History Tab ──────────────────────────────────────────────── -->
      <div class="tab-panel" id="tab-history">
        <div class="filter-grid">
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">From Date</label>
            <input type="date" id="h-from">
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">To Date</label>
            <input type="date" id="h-to">
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">Agent</label>
            <select id="h-agent"><option value="">All agents</option></select>
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">Op. Zone</label>
            <select id="h-zone"><option value="">All zones</option></select>
          </div>
        </div>
        <div class="filter-search">
          <input type="text" id="h-search" placeholder="Search Order ID…" autocomplete="off">
          <button class="btn-search" id="btn-search">Search</button>

        </div>

      </div>

    </div>

</div>

<script type="module">
console.log('[Bloom OL Handover] Build: 2026-05-19 — v1.0.0');

import { initializeApp }           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection,
         query, where, orderBy, limit, runTransaction, serverTimestamp,
         Timestamp, enableIndexedDbPersistence, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getAnalytics }              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js';

// ── Firebase — dedicated Bloom Online Delivery project ────────────────────────
const app = initializeApp({
  apiKey:            "AIzaSyBnotQTRCsolWRY8OkQUjb68RV6N-alZg4",
  authDomain:        "bloom-online-delivery.firebaseapp.com",
  projectId:         "bloom-online-delivery",
  storageBucket:     "bloom-online-delivery.firebasestorage.app",
  messagingSenderId: "1083336380275",
  appId:             "1:1083336380275:web:a8e80a8e4de6e6a40ebf06",
  measurementId:     "G-VPT8W9WNHF"
});
const db        = getFirestore(app);
const auth      = getAuth(app);
const analytics = getAnalytics(app);

// ── Offline persistence (mirrors handover.html approach) ──────────────────────
// Caches agents, zones and recent records in IndexedDB for patchy networks.
try {
  await enableIndexedDbPersistence(db);
  console.log('[OL Handover] IndexedDB persistence enabled');
} catch (err) {
  if (err.code === 'failed-precondition') console.warn('[OL Handover] Multi-tab: persistence disabled in this tab.');
  else if (err.code === 'unimplemented')  console.warn('[OL Handover] Browser: IndexedDB not supported.');
  else console.warn('[OL Handover] Persistence init failed (non-fatal):', err);
}

await signInAnonymously(auth);

// ── Constants ─────────────────────────────────────────────────────────────────
const OL_STORE_ID = 'online';    // All ol_ collection writes use this store_id
const ALLOWED_ROLES = ['super_admin', 'store_admin', 'staff'];

// ── State ─────────────────────────────────────────────────────────────────────
let session       = null;   // { passcode, username, role, store_id }
let config        = null;   // { agents, agentMap, opZones }
let orders        = [];     // [{ order_id }]
let selectedOpZone= null;   // { id, label } — currently selected operational zone
let codeReader    = null;
let currentStream = null;
let cameraOpen    = false;
let isFlashOn     = false;
let lastScanned   = '';
let lastScannedAt = 0;
let audioCtx      = null;
let _zonesUnsub   = null;   // onSnapshot unsubscribe for ol_zones
let _heartbeatUnsub = null;
let _forceLogoutInProgress = false;

// Returns YYYY-MM-DD in the user's local timezone (avoids UTC off-by-one at night)
function localDateStr(d) {
  const dt = d || new Date();
  const y  = dt.getFullYear();
  const m  = String(dt.getMonth() + 1).padStart(2, '0');
  const dy = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${dy}`;
}

// Generates a human-readable batch code: RUN-YYYYMMDD-XXXXX
function generateBatchCode() {
  const d = new Date();
  const dateStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const rand    = Math.random().toString(36).slice(2, 7).toUpperCase();
  return `RUN-${dateStr}-${rand}`;
}

// ── Audio / haptic ────────────────────────────────────────────────────────────
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 1046; osc.type = 'sine';
    gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) {}
}
function vibrate() { try { if (navigator.vibrate) navigator.vibrate([60,30,40]); } catch(e) {} }

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('unlock-btn')       .addEventListener('click', handleLogin);
document.getElementById('passcode-input')   .addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });
document.getElementById('logout-btn')       .addEventListener('click', handleLogout);
document.getElementById('btn-cam')          .addEventListener('click', toggleCamera);
document.getElementById('btn-flash')        .addEventListener('click', toggleFlash);
document.getElementById('btn-add')          .addEventListener('click', addCurrentOrder);
document.getElementById('btn-clear')        .addEventListener('click', clearAll);
document.getElementById('btn-submit')       .addEventListener('click', submitHandover);
document.getElementById('btn-search')       .addEventListener('click', loadHistory);
document.getElementById('btn-clear-input')  .addEventListener('click', () => {
  const inp = document.getElementById('order-id-input');
  inp.value = ''; inp.classList.remove('scanned'); validateAddBtn(); inp.focus();
});
document.getElementById('order-id-input')   .addEventListener('input', function() {
  this.classList.remove('scanned'); validateAddBtn();
});
document.getElementById('order-id-input')   .addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); this.blur(); setTimeout(addCurrentOrder, 150); }
});
document.getElementById('tab-scan-btn')     .addEventListener('click', function() { switchTab('scan', this); });
document.getElementById('tab-history-btn')  .addEventListener('click', function() {
  switchTab('history', this); loadHistory();
});
document.getElementById('btn-clear-history').addEventListener('click', () => {
  const today = localDateStr();
  document.getElementById('h-from').value    = today;
  document.getElementById('h-to').value      = today;
  document.getElementById('h-agent').value   = '';
  document.getElementById('h-zone').value    = '';
  document.getElementById('h-search').value  = '';
  document.getElementById('history-list').innerHTML = '<div class="empty-state">Use filters to load records</div>';
});

// ── Restore session & pending orders ──────────────────────────────────────────
try { const s = localStorage.getItem('bloom_ol_hs'); if (s) { session = JSON.parse(s); bootApp(); } } catch(e) {}
try { const p = localStorage.getItem('bloom_ol_ho'); if (p) orders = JSON.parse(p); } catch(e) {}
const _today = localDateStr();
document.getElementById('h-from').value = _today;
document.getElementById('h-to').value   = _today;

// ── Authentication ────────────────────────────────────────────────────────────
async function handleLogin() {
  const passcode = document.getElementById('passcode-input').value.trim();
  if (!passcode) return;
  showLoader('Verifying…');
  try {
    const userSnap = await getDoc(doc(db, 'users', passcode));
    if (!userSnap.exists()) {
      hideLoader(); showLoginError('Invalid passcode. Please try again.'); return;
    }
    const ud = userSnap.data();

    // Explicit blocklist: missing/undefined status defaults to 'active'
    if ((ud.status || 'active') !== 'active') {
      hideLoader(); showLoginError('Account is deactivated. Contact your manager.'); return;
    }

    // Access control: super_admin always allowed; others must belong to online store
    if (ud.role !== 'super_admin' && ud.store_id !== OL_STORE_ID) {
      hideLoader(); showLoginError('Access denied — online store only.'); return;
    }

    session = { passcode, username: ud.username || ud.display_name || passcode,
                role: ud.role, store_id: ud.store_id };
    try { localStorage.setItem('bloom_ol_hs', JSON.stringify(session)); } catch(e) {}

    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none'; errEl.textContent = 'Invalid passcode. Please try again.';
    hideLoader();
    bootApp();
  } catch(e) {
    hideLoader(); showToast('Connection error — try again', 'error');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('passcode-input').value = '';
}

function handleLogout() {
  stopCamera();
  stopHeartbeat();
  stopZonesListener();
  try { localStorage.removeItem('bloom_ol_hs'); localStorage.removeItem('bloom_ol_ho'); } catch(e) {}
  session = null; config = null; orders = []; selectedOpZone = null;
  document.getElementById('main-app').style.display    = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('passcode-input').value = '';
}

// ── Boot (post-login config load) ─────────────────────────────────────────────
async function bootApp() {
  showLoader('Loading…');
  try {
    // Agents for online store
    const agentsSnap = await getDocs(query(
      collection(db, 'agents'),
      where('store_id', '==', OL_STORE_ID),
      where('status', '==', 'active')
    ));
    const agents   = agentsSnap.docs.map(d => ({ id: d.id, name: d.data().name }));
    const agentMap = {};
    agents.forEach(a => { agentMap[a.id] = a.name; });

    config = { agents, agentMap, opZones: [] };

    populateAgentDropdowns();
    document.getElementById('display-user').textContent = session.username;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display    = 'block';
    if (orders.length) renderOrders();

    hideLoader();

    // Heartbeat + zone listener start after UI is visible
    startHeartbeat();
    startZonesListener();   // fires initial snapshot → builds zone picker
  } catch(e) {
    hideLoader(); showToast('Failed to load config — check connection', 'error');
    console.error('[OL Handover] bootApp error:', e);
  }
}

// ── User-status heartbeat (mirrors handover.html exactly) ─────────────────────
function startHeartbeat() {
  stopHeartbeat();
  if (!session?.passcode) return;
  _heartbeatUnsub = onSnapshot(doc(db, 'users', session.passcode), (snap) => {
    if (!snap.exists()) {
      forceLogout('missing');
    } else if ((snap.data().status || 'active') !== 'active') {
      forceLogout('inactive');
    }
  }, err => console.warn('[OL Heartbeat] snapshot error:', err?.code));
}

function stopHeartbeat() {
  if (_heartbeatUnsub) { _heartbeatUnsub(); _heartbeatUnsub = null; }
}

function forceLogout(reason) {
  if (_forceLogoutInProgress) return;
  _forceLogoutInProgress = true;
  stopHeartbeat();
  try { stopCamera(); } catch(_) {}
  const msg = reason === 'missing'
    ? 'Your account no longer exists. Contact your manager.'
    : 'Your account has been deactivated. Contact your manager.';
  const finish = () => { handleLogout(); _forceLogoutInProgress = false; };
  if (typeof Swal !== 'undefined') {
    Swal.fire({ title:'Account Deactivated', text:msg, icon:'error',
                confirmButtonText:'OK', allowOutsideClick:false, allowEscapeKey:false })
      .then(finish);
  } else { alert(msg); finish(); }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && session?.passcode) {
    // Zone listener re-syncs automatically via onSnapshot — no manual reload needed.
    // Heartbeat is continuous — nothing to do here.
  }
});

// ── Operational Zones — real-time listener (mirrors zones listener pattern) ───
// Cost: 1 read/session start + 1 read per zone doc that actually changes.
// Propagation is sub-second — admin changes appear without page refresh.
function startZonesListener() {
  stopZonesListener();
  const q = query(collection(db, 'ol_zones'), orderBy('order', 'asc'));
  _zonesUnsub = onSnapshot(q, (snap) => {
    const newZones = snap.docs
      .filter(d => (d.data().status || 'active') === 'active')
      .map(d => ({ id: d.id, label: d.data().label, order: d.data().order || 0 }));

    // Short-circuit if nothing changed (avoids flicker on unrelated Firestore events)
    const prev = JSON.stringify((config?.opZones || []).map(z => z.id));
    const next = JSON.stringify(newZones.map(z => z.id));
    if (prev === next) return;

    if (config) config.opZones = newZones;
    buildOpZonePicker(newZones);
    populateZoneFilter(newZones);
  }, err => console.warn('[OL Zones listener] error:', err?.code));
}

function stopZonesListener() {
  if (_zonesUnsub) { _zonesUnsub(); _zonesUnsub = null; }
}

// ── Operational zone picker (no price, no free zone — purely a label) ─────────
function buildOpZonePicker(zones) {
  const picker = document.getElementById('op-zone-picker');
  if (!zones.length) {
    picker.innerHTML = '<div class="op-zone-empty">No operational zones configured — ask your admin to add zones.</div>';
    return;
  }
  // Deselect if the currently selected zone was removed
  if (selectedOpZone && !zones.find(z => z.id === selectedOpZone.id)) {
    selectedOpZone = null; validateSubmit();
  }
  picker.innerHTML = '';
  zones.forEach(z => {
    const btn  = document.createElement('button');
    btn.className    = 'op-zone-btn' + (selectedOpZone?.id === z.id ? ' active' : '');
    btn.textContent  = z.label;
    btn.dataset.zid  = z.id;
    btn.dataset.zlbl = z.label;
    btn.addEventListener('click', () => selectOpZone(z.id, z.label, btn));
    picker.appendChild(btn);
  });
}

function selectOpZone(id, label, btn) {
  selectedOpZone = { id, label };
  document.querySelectorAll('.op-zone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  validateSubmit();
}

// ── Dropdowns ─────────────────────────────────────────────────────────────────
function populateAgentDropdowns() {
  const agentSel = document.getElementById('agent-select');
  agentSel.innerHTML = '<option value="">— Select agent —</option>';
  (config.agents || []).forEach(a => {
    agentSel.innerHTML += `<option value="${a.id}">${a.name}</option>`;
  });
  const hAgent = document.getElementById('h-agent');
  hAgent.innerHTML = '<option value="">All agents</option>';
  (config.agents || []).forEach(a => {
    hAgent.innerHTML += `<option value="${a.id}">${a.name}</option>`;
  });
}

function populateZoneFilter(zones) {
  const hZone = document.getElementById('h-zone');
  hZone.innerHTML = '<option value="">All zones</option>';
  zones.forEach(z => { hZone.innerHTML += `<option value="${z.id}">${z.label}</option>`; });
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name !== 'scan') stopCamera();
}

// ── Camera (identical to handover.html) ───────────────────────────────────────
async function toggleCamera() {
  if (cameraOpen) { stopCamera(); return; }
  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  if (!navigator.mediaDevices?.getUserMedia) {
    showToast('Camera not available — type the order ID manually', 'warning');
    document.getElementById('order-id-input').focus(); return;
  }
  if (typeof ZXing === 'undefined' || !ZXing.BrowserMultiFormatReader) {
    showToast('Scanner library failed to load — refresh the page', 'error'); return;
  }
  let initFailed = false;
  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    const constraints = { video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} } };
    codeReader.decodeFromConstraints(constraints, 'video-feed', (result, err) => {
      if (result) {
        const text = result.getText(), now = Date.now();
        if (text === lastScanned && now - lastScannedAt < 800) return;
        lastScanned = text; lastScannedAt = now;
        handleScanResult(text); return;
      }
      if (err?.name && err.name !== 'NotFoundException') {
        console.warn('[scanner] decode error:', err.name, err.message);
      }
    });
    document.getElementById('scanner-wrap').style.display = 'block';
    document.getElementById('btn-cam').classList.add('cam-on');
    cameraOpen = true;
  } catch (initErr) {
    initFailed = true;
    handleCameraInitError(initErr);
  }
  if (initFailed) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
    currentStream = stream;
    const caps = stream.getVideoTracks()[0].getCapabilities?.() || {};
    if (caps.torch) document.getElementById('btn-flash').classList.add('visible');
  } catch(e) {}
}

function handleCameraInitError(err) {
  stopCamera();
  const n = err?.name || '';
  if (n === 'NotAllowedError'   || n === 'PermissionDeniedError')
    showToast('Camera permission denied — grant access in browser settings', 'error', 5000);
  else if (n === 'NotFoundError' || n === 'DevicesNotFoundError')
    showToast('No camera found on this device — use manual input', 'warning', 4000);
  else if (n === 'NotReadableError' || n === 'TrackStartError')
    showToast('Camera is in use by another app', 'warning', 4000);
  else showToast('Camera failed to start — use manual input', 'warning', 4000);
  setTimeout(() => document.getElementById('order-id-input')?.focus(), 300);
}

function stopCamera() {
  try { if (codeReader) { codeReader.reset(); codeReader = null; } } catch(e) {}
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  const v = document.getElementById('video-feed');
  if (v?.srcObject) { try { v.srcObject.getTracks().forEach(t => t.stop()); } catch(e) {} v.srcObject = null; }
  document.getElementById('scanner-wrap').style.display = 'none';
  document.getElementById('btn-cam').classList.remove('cam-on');
  document.getElementById('btn-flash').classList.remove('visible', 'on');
  isFlashOn = false; cameraOpen = false;
}

function toggleFlash() {
  if (!currentStream) return;
  try {
    isFlashOn = !isFlashOn;
    currentStream.getVideoTracks()[0].applyConstraints({ advanced: [{ torch: isFlashOn }] });
    document.getElementById('btn-flash').classList.toggle('on', isFlashOn);
  } catch(e) { showToast('Flash not supported', 'info'); }
}

function handleScanResult(text) {
  const cleaned = text.trim();
  if (!/^\d+$/.test(cleaned)) { showToast('Invalid barcode — numbers only', 'warning'); return; }
  vibrate(); beep();
  const inp = document.getElementById('order-id-input');
  inp.value = cleaned; inp.classList.add('scanned');
  validateAddBtn(); stopCamera();
}

// ── Validation ────────────────────────────────────────────────────────────────
function validateAddBtn() {
  const id = document.getElementById('order-id-input').value.trim();
  document.getElementById('btn-add').disabled = !id || !/^\d+$/.test(id);
}

function validateSubmit() {
  document.getElementById('btn-submit').disabled = orders.length === 0;
}

// ── Add / remove / render orders ──────────────────────────────────────────────
function addCurrentOrder() {
  if (!selectedOpZone) { showToast('Select an operational zone first', 'warning'); return; }
  const order_id = document.getElementById('order-id-input').value.trim().substring(0, 64);
  if (!order_id)                                 { showToast('Enter an Order ID', 'warning'); return; }
  if (!/^\d+$/.test(order_id))                   { showToast('Order IDs must be numeric', 'warning'); return; }
  if (orders.find(o => o.order_id === order_id)) { showToast('Order already in list', 'warning'); return; }
  orders.push({ order_id });
  try { localStorage.setItem('bloom_ol_ho', JSON.stringify(orders)); } catch(e) {}
  renderOrders();
  showToast('Added ✓', 'success');
  document.getElementById('order-id-input').value = '';
  document.getElementById('order-id-input').classList.remove('scanned');
  validateAddBtn(); validateSubmit();
}

function renderOrders() {
  const list = document.getElementById('order-list');
  document.getElementById('count').textContent = orders.length;
  if (!orders.length) { list.innerHTML = '<div class="empty-state">No orders added yet</div>'; validateSubmit(); return; }
  const zoneLabel = selectedOpZone?.label || '';
  list.innerHTML = orders.slice().reverse().map((o, i) => {
    const realIdx = orders.length - 1 - i;
    return `<div class="order-item">
      <div class="order-item-left">
        <span class="order-item-id">${o.order_id}</span>
        ${zoneLabel ? `<span class="zone-pill">${zoneLabel}</span>` : ''}
      </div>
      <button class="btn-remove" data-idx="${realIdx}">×</button>
    </div>`;
  }).join('');
  list.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', function() { removeOrder(parseInt(this.dataset.idx)); });
  });
  validateSubmit();
}

function removeOrder(idx) {
  orders.splice(idx, 1);
  try { localStorage.setItem('bloom_ol_ho', JSON.stringify(orders)); } catch(e) {}
  renderOrders();
}

function clearAll() {
  if (!orders.length) return;
  if (!confirm('Clear all orders from list?')) return;
  orders = []; try { localStorage.removeItem('bloom_ol_ho'); } catch(e) {}
  renderOrders();
}

// ── Submit — creates batch doc + per-order docs with duplicate guard ───────────
// Uses runTransaction per order (same proven pattern as handover.html) for
// atomic duplicate detection, then a single setDoc for the batch summary.
// For 20-30 orders this is fast enough; the progress loader keeps UX clear.
async function submitHandover() {
  const agentId = document.getElementById('agent-select').value;
  const notes   = document.getElementById('notes-input').value.trim();

  if (!agentId)        { showToast('Select a delivery agent first', 'warning'); return; }
  if (!selectedOpZone) { showToast('Select an operational zone', 'warning'); return; }
  if (!orders.length)  { showToast('Add at least one order first', 'warning'); return; }

  showLoader(`Saving 0 / ${orders.length}…`);

  const ts        = new Date();
  // Doc-key dates use UTC (consistent with handover.html convention)
  const dateStr   = ts.toISOString().split('T')[0];
  const agentName = config.agentMap[agentId] || agentId;
  const batchCode = generateBatchCode();
  // Batch ID: dateStr + agentId + random — unique even for same agent dispatching twice/day
  const batchId   = `${dateStr.replace(/-/g,'')}_${agentId}_${Date.now().toString(36).toUpperCase()}`;

  const saved      = [];   // successfully written order IDs
  const duplicates = [];   // already existed today

  let i = 0;
  for (const o of orders) {
    i++;
    document.getElementById('loader-text').textContent = `Saving ${i} / ${orders.length}…`;

    const docKey   = `${dateStr}_${o.order_id}`;
    const orderRef = doc(db, 'ol_handover_log',  docKey);
    const indexRef = doc(db, 'ol_order_index',   docKey);

    try {
      await runTransaction(db, async (tx) => {
        const indexSnap = await tx.get(indexRef);
        if (indexSnap.exists()) throw new Error('DUPLICATE');

        // Index doc — fast existence check, prevents TOCTOU races
        tx.set(indexRef, {
          store_id:      OL_STORE_ID,
          date:          dateStr,
          batch_id:      batchId,
          first_seen_ts: serverTimestamp(),
        });

        // Main handover record — carries all audit-phase fields as null initially
        tx.set(orderRef, {
          order_id:           o.order_id,
          batch_id:           batchId,
          batch_code:         batchCode,
          agent_id:           agentId,
          agent_name:         agentName,
          op_zone_id:         selectedOpZone.id,
          op_zone_label:      selectedOpZone.label,
          store_id:           OL_STORE_ID,
          processed_by:       session.passcode,
          processed_by_name:  session.username,
          notes:              notes,
          date:               dateStr,
          created_at:         serverTimestamp(),
          status:             'handed',   // handed | delivered | returned | audited
          delivery:           null,       // filled by ol-delivery.html
          audit:              null,       // filled by ol-admin.html end-of-day audit
        });
      });
      saved.push(o.order_id);
    } catch(e) {
      // 'DUPLICATE' from our own guard, or a Firestore conflict — skip silently
      duplicates.push(o.order_id);
    }
  }

  // Create the batch summary document (one Firestore write)
  if (saved.length > 0) {
    try {
      await setDoc(doc(db, 'ol_batches', batchId), {
        batch_code:         batchCode,
        agent_id:           agentId,
        agent_name:         agentName,
        op_zone_id:         selectedOpZone.id,
        op_zone_label:      selectedOpZone.label,
        store_id:           OL_STORE_ID,
        dispatched_by:      session.passcode,
        dispatched_by_name: session.username,
        dispatched_at:      serverTimestamp(),
        date:               dateStr,
        order_count:        saved.length,
        order_ids:          saved,
        status:             'dispatched',  // dispatched | returned | audit_complete
        returned_at:        null,
        audit_complete_at:  null,
        audited_by:         null,
        audit_summary:      null,
      });
    } catch(batchErr) {
      // Batch doc failure is non-fatal — orders are already saved individually
      console.error('[OL Handover] batch doc write failed (non-fatal):', batchErr);
    }
  }

  hideLoader();

  if (saved.length > 0) {
    const dupMsg = duplicates.length
      ? ` ${duplicates.length} duplicate${duplicates.length > 1 ? 's' : ''} skipped.`
      : '';
    showToast(`${saved.length} order${saved.length > 1 ? 's' : ''} saved — ${batchCode}${dupMsg}`, 'success', 4000);
    // Reset form
    orders = []; try { localStorage.removeItem('bloom_ol_ho'); } catch(e) {}
    selectedOpZone = null;
    document.getElementById('agent-select').value = '';
    document.getElementById('order-id-input').value = '';
    document.getElementById('notes-input').value = '';
    document.querySelectorAll('.op-zone-btn').forEach(b => b.classList.remove('active'));
    renderOrders(); stopCamera();
  } else {
    showToast('All orders already exist today — nothing saved', 'warning');
  }
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  const from    = document.getElementById('h-from').value;
  const to      = document.getElementById('h-to').value;
  const agentId = document.getElementById('h-agent').value;
  const zoneId  = document.getElementById('h-zone').value;
  const search  = document.getElementById('h-search').value.trim();

  if (!from || !to) {
    document.getElementById('history-list').innerHTML =
      '<div class="empty-state">Please select a date range</div>';
    return;
  }

  const fromTs = new Date(from + 'T00:00:00').getTime();
  const toTs   = new Date(to   + 'T23:59:59.999').getTime();
  if (fromTs > toTs) {
    document.getElementById('history-list').innerHTML =
      '<div class="empty-state">"From" must be before "To"</div>';
    return;
  }
  if ((toTs - fromTs) > 30 * 24 * 60 * 60 * 1000) {
    document.getElementById('history-list').innerHTML =
      '<div class="empty-state">Date range too large — max 30 days</div>';
    return;
  }

  showLoader('Loading history…');
  try {
    const firestoreFrom = Timestamp.fromDate(new Date(from + 'T00:00:00'));
    const firestoreTo   = Timestamp.fromDate(new Date(to   + 'T23:59:59.999'));

    // Primary query: date range on store
    let q;
    try {
      const constraints = [
        where('store_id', '==', OL_STORE_ID),
        where('created_at', '>=', firestoreFrom),
        where('created_at', '<=', firestoreTo),
        orderBy('created_at', 'desc'),
        limit(500),
      ];
      q = query(collection(db, 'ol_handover_log'), ...constraints);
    } catch(_) {
      // Fallback if composite index not yet built
      q = query(collection(db, 'ol_handover_log'),
        where('store_id', '==', OL_STORE_ID), limit(500));
    }

    const snap = await getDocs(q);
    let rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Client-side filters (date already filtered at Firestore level in primary path)
    rows = rows.filter(r => {
      const ts = r.created_at?.toDate?.()?.getTime?.() || 0;
      return ts >= fromTs && ts <= toTs;
    });
    if (agentId) rows = rows.filter(r => r.agent_id === agentId);
    if (zoneId)  rows = rows.filter(r => r.op_zone_id === zoneId);
    if (search)  rows = rows.filter(r => String(r.order_id||'').includes(search));

    hideLoader();
    displayHistory(rows);
  } catch(e) {
    hideLoader();
    showToast('Failed to load history', 'error');
    console.error('[OL History]', e);
  }
}

function displayHistory(rows) {
  const container = document.getElementById('history-list');
  if (!rows.length) {
    container.innerHTML = '<div class="empty-state">No records found</div>';
    return;
  }

  const summaryBar = `<div class="history-summary-bar">
    <span>Results: <b>${rows.length}</b> orders</span>
  </div>`;

  const items = rows.map(r => {
    const ts = r.created_at?.toDate?.();
    const dateLabel = ts
      ? ts.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
        + ' ' + ts.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })
      : '—';

    const statusClass = { handed:'s-handed', delivered:'s-delivered',
                          audited:'s-audited', returned:'s-returned' }[r.status] || 's-handed';
    const statusLabel = { handed:'Handed Over', delivered:'Delivered',
                          audited:'Audited', returned:'Returned' }[r.status] || r.status;

    return `<div class="history-item">
      <div class="history-top">
        <span class="history-id">${r.order_id || r.id}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="status-badge ${statusClass}">${statusLabel}</span>
          <button class="btn-delete-order" title="Delete" data-id="${r.id}">🗑</button>
        </div>
      </div>
      <div class="history-meta">
        👤 ${r.agent_name || r.agent_id}
        <span class="op-zone-tag">${r.op_zone_label || r.op_zone_id || '—'}</span>
        <span class="batch-tag">${r.batch_code || '—'}</span><br>
        🕐 ${dateLabel}
        ${r.processed_by_name ? ` · By: ${r.processed_by_name}` : ''}
        ${r.notes ? `<br>📝 ${r.notes}` : ''}
        ${r.audit ? `<br>💰 Audited fee: <b>${r.audit.shipping_fee} EGP</b> (${r.audit.from_region_label} → ${r.audit.to_region_label})` : ''}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = summaryBar + items;

  container.querySelectorAll('.btn-delete-order').forEach(btn => {
    btn.addEventListener('click', function() { deleteHistoryItem(this.dataset.id); });
  });
}

async function deleteHistoryItem(docId) {
  if (!confirm(`Delete order record?\n${docId}`)) return;
  showLoader('Deleting…');
  try {
    await deleteDoc(doc(db, 'ol_handover_log', docId));
    try { await deleteDoc(doc(db, 'ol_order_index', docId)); } catch(_) {}
    hideLoader();
    showToast('Record deleted', 'success');
    loadHistory();
  } catch(e) {
    hideLoader(); showToast('Delete failed', 'error');
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showLoader(text) {
  document.getElementById('loader-text').textContent = text || 'Loading…';
  document.getElementById('loader').classList.add('show');
}
function hideLoader() { document.getElementById('loader').classList.remove('show'); }

function showToast(msg, type = 'info', duration = 3000) {
  const wrap  = document.getElementById('toast-wrap');
  const toast = document.createElement('div');
  toast.className   = `toast ${type}`;
  toast.textContent = msg;
  wrap.appendChild(toast);
  setTimeout(() => toast.remove(), duration + 400);
}
</script>
