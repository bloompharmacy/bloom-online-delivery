<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bloom — تطبيق السائق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    :root {
      --bloom:      #b22025;
      --bloom-dark: #8a1a1e;
      --bloom-bg:   #fdf2f2;
      --surface:    #ffffff;
      --bg:         #f3f4f8;
      --text:       #111827;
      --muted:      #6b7280;
      --border:     #e5e7eb;
      --radius:     12px;
      --shadow:     0 2px 8px rgba(0,0,0,.1);
      --green:      #16a34a;
      --green-bg:   #dcfce7;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --blue:       #2563eb;
      --blue-bg:    #dbeafe;
      --orange:     #d97706;
      --orange-bg:  #fff3cd;
      --purple:     #7c3aed;
      --purple-bg:  #ede9fe;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    /* ── Login ────────────────────────────────── */
    #loginScreen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, var(--bloom-dark) 0%, var(--bloom) 100%);
      padding: 24px;
    }
    .login-card {
      background: var(--surface); border-radius: 20px; padding: 40px 32px;
      width: 100%; max-width: 360px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .login-logo { font-size: 56px; margin-bottom: 8px; }
    .login-title { font-size: 26px; font-weight: 900; color: var(--bloom); margin-bottom: 4px; }
    .login-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .login-field {
      width: 100%; padding: 14px 16px; border: 2px solid var(--border);
      border-radius: var(--radius); font-size: 16px; font-family: 'Cairo', sans-serif;
      outline: none; transition: border-color .2s; margin-bottom: 12px;
      text-align: center; direction: ltr;
    }
    .login-field:focus { border-color: var(--bloom); }
    .login-field.pin-field { font-size: 24px; letter-spacing: 8px; }
    .login-btn {
      width: 100%; padding: 15px; background: var(--bloom); color: #fff;
      border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700;
      font-family: 'Cairo', sans-serif; cursor: pointer; transition: background .2s;
      margin-top: 4px;
    }
    .login-btn:hover { background: var(--bloom-dark); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; font-weight: 600; }

    /* ── App Shell ────────────────────────────── */
    #appShell {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Top Bar ──────────────────────────────── */
    .topbar {
      background: var(--bloom); color: #fff; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(178,32,37,.3); flex-shrink: 0;
    }
    .topbar-title { font-size: 18px; font-weight: 700; }
    .topbar-user  { font-size: 12px; opacity: .85; }
    .topbar-logout { background: rgba(255,255,255,.2); border: none; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600; }
    .topbar-logout:hover { background: rgba(255,255,255,.3); }

    /* ── Scrollable Content ───────────────────── */
    .app-body { flex: 1; overflow-y: auto; padding: 16px; }

    /* ── Order Cards ──────────────────────────── */
    .orders-list { display: flex; flex-direction: column; gap: 12px; }
    .order-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
      overflow: hidden; cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .order-card:active { transform: scale(.98); }
    .order-card-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .order-name { font-size: 16px; font-weight: 700; }
    .status-chip {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .chip-assigned   { background: var(--blue-bg);   color: var(--blue); }
    .chip-in_transit { background: var(--purple-bg);  color: var(--purple); }
    .chip-delivered  { background: var(--green-bg);   color: var(--green); }
    .chip-failed     { background: var(--red-bg);     color: var(--red); }
    .order-card-body { padding: 12px 16px; }
    .detail-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 14px; align-items: flex-start; }
    .detail-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .detail-text { flex: 1; color: var(--text); line-height: 1.4; }
    .detail-text.muted { color: var(--muted); }
    .order-card-actions {
      padding: 10px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    /* ── Action Buttons ───────────────────────── */
    .action-btn {
      flex: 1; min-width: 120px; padding: 12px 8px; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 700;
      font-family: 'Cairo', sans-serif; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .action-btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-transit  { background: var(--purple-bg); color: var(--purple); }
    .btn-transit:hover:not(:disabled)  { background: var(--purple); color: #fff; }
    .btn-deliver  { background: var(--green-bg);  color: var(--green); }
    .btn-deliver:hover:not(:disabled)  { background: var(--green); color: #fff; }
    .btn-fail     { background: var(--red-bg);    color: var(--red); }
    .btn-fail:hover:not(:disabled)     { background: var(--red); color: #fff; }
    .btn-call     { background: var(--blue-bg);   color: var(--blue); }
    .btn-call:hover:not(:disabled)     { background: var(--blue); color: #fff; }

    /* ── Empty & Loading ──────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .empty-sub   { font-size: 14px; }
    .loading-state { text-align: center; padding: 40px; color: var(--muted); font-size: 15px; }

    /* ── Summary Bar ──────────────────────────── */
    .summary-bar {
      display: flex; gap: 10px; margin-bottom: 16px;
    }
    .summary-chip {
      flex: 1; background: var(--surface); border-radius: 10px;
      padding: 12px 8px; text-align: center; box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .summary-val   { font-size: 22px; font-weight: 900; }
    .summary-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .val-blue   { color: var(--blue); }
    .val-purple { color: var(--purple); }
    .val-green  { color: var(--green); }

    /* ── Modals ───────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 1000; padding: 0;
    }
    .modal-sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px; padding: 24px 20px 32px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .modal-label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
    .modal-input {
      width: 100%; padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 15px; font-family: 'Cairo', sans-serif;
      outline: none; margin-bottom: 14px; direction: rtl;
    }
    .modal-input:focus { border-color: var(--bloom); }
    .modal-select {
      width: 100%; padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 15px; font-family: 'Cairo', sans-serif;
      outline: none; margin-bottom: 14px; background: var(--surface);
    }
    .modal-select:focus { border-color: var(--bloom); }
    .modal-error { color: var(--red); font-size: 13px; margin-bottom: 12px; font-weight: 600; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .modal-btn {
      flex: 1; padding: 14px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; font-family: 'Cairo', sans-serif;
      cursor: pointer; transition: all .2s;
    }
    .modal-btn:disabled { opacity: .5; cursor: not-allowed; }
    .modal-btn-primary { background: var(--bloom); color: #fff; }
    .modal-btn-primary:hover:not(:disabled) { background: var(--bloom-dark); }
    .modal-btn-cancel  { background: var(--bg); color: var(--muted); }

    /* ── Toast ────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 600; font-family: 'Cairo', sans-serif;
      z-index: 2000; opacity: 0; transition: all .3s; white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.t-success { background: var(--green); }
    #toast.t-error   { background: var(--red); }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🌸</div>
    <div class="login-title">Bloom</div>
    <div class="login-sub">بوابة السائق</div>
    <form id="loginForm" autocomplete="off">
      <input id="agentIdInput" class="login-field" type="text"
             placeholder="رقم المعرّف (Driver ID)" maxlength="20"
             dir="ltr" autocomplete="username">
      <input id="pinInput" class="login-field pin-field" type="password"
             placeholder="• • • •" maxlength="8"
             dir="ltr" autocomplete="current-password">
      <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── App Shell ──────────────────────────────────────────────── -->
<div id="appShell" hidden>
  <!-- Top Bar -->
  <div class="topbar">
    <div>
      <div class="topbar-title">🌸 بلوم</div>
      <div class="topbar-user" id="topbarUser">—</div>
    </div>
    <button class="topbar-logout" onclick="doLogout()">خروج</button>
  </div>

  <!-- Scrollable body -->
  <div class="app-body" id="appBody">
    <!-- Summary Chips -->
    <div class="summary-bar">
      <div class="summary-chip"><div class="summary-val val-blue" id="sumAssigned">0</div><div class="summary-label">معيّن</div></div>
      <div class="summary-chip"><div class="summary-val val-purple" id="sumTransit">0</div><div class="summary-label">في الطريق</div></div>
      <div class="summary-chip"><div class="summary-val val-green" id="sumDelivered">0</div><div class="summary-label">مُسلَّم اليوم</div></div>
    </div>

    <!-- Orders List -->
    <div id="ordersContainer">
      <div class="loading-state">جارٍ التحميل…</div>
    </div>
  </div>
</div>

<!-- ── Deliver Modal ──────────────────────────────────────────── -->
<div class="modal-overlay" id="modalDeliver" hidden>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✅ تأكيد التسليم</div>
    <label class="modal-label">رابط صورة التسليم (اختياري)</label>
    <input class="modal-input" id="deliverPhotoUrl" type="url" placeholder="https://..." dir="ltr">
    <div class="modal-error" id="deliverError"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeDeliverModal()">إلغاء</button>
      <button class="modal-btn modal-btn-primary" id="confirmDeliverBtn" onclick="confirmDeliver()">تأكيد التسليم</button>
    </div>
  </div>
</div>

<!-- ── Fail Modal ─────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalFail" hidden>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">❌ تسجيل فشل التسليم</div>
    <label class="modal-label">سبب الفشل</label>
    <select class="modal-select" id="failReason">
      <option value="">— اختر السبب —</option>
      <option value="customer_unavailable">العميل غير متاح</option>
      <option value="wrong_address">العنوان خاطئ</option>
      <option value="customer_refused">العميل رفض الاستلام</option>
      <option value="area_unreachable">المنطقة غير مغطاة</option>
      <option value="postponed_by_customer">تأجيل بطلب العميل</option>
      <option value="other">سبب آخر</option>
    </select>
    <label class="modal-label" id="failNoteLabel" hidden>ملاحظات إضافية</label>
    <input class="modal-input" id="failNote" type="text" placeholder="اكتب ملاحظة…" hidden>
    <div class="modal-error" id="failError"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeFailModal()">إلغاء</button>
      <button class="modal-btn modal-btn-primary" id="confirmFailBtn" onclick="confirmFail()" style="background:var(--red)">تأكيد الفشل</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }                  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, doc, collection, setDoc,
  query, where, orderBy, onSnapshot,
  writeBatch, increment, serverTimestamp, Timestamp,
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ─────────────────────────────────────────────────────────────
// Config — update VERCEL_API to your Vercel deployment URL
// ─────────────────────────────────────────────────────────────
const VERCEL_API = 'https://bloom-shopify-delivery.vercel.app'; // ← your Vercel URL

const firebaseConfig = {
  apiKey:            "AIzaSyBnotQTRCsolWRY8OkQUjb68RV6N-alZg4",
  authDomain:        "bloom-online-delivery.firebaseapp.com",
  projectId:         "bloom-online-delivery",
  storageBucket:     "bloom-online-delivery.firebasestorage.app",
  messagingSenderId: "1083336380275",
  appId:             "1:1083336380275:web:a8e80a8e4de6e6a40ebf06",
};

const SESSION_KEY = 'bloom_driver_session_v1';
const SESSION_TTL = 8 * 60 * 60 * 1000; // 8 hours

// ── State ──────────────────────────────────────────────────────
let db, auth;
let _driver    = null;  // { agentId, displayName, token, ts }
let _ordersUnsub = null;
let _pendingOrderId = null; // for modal actions

// ── Init ───────────────────────────────────────────────────────
const _app = initializeApp(firebaseConfig);
db   = getFirestore(_app);
auth = getAuth(_app);

(async () => {
  const saved = loadSession();
  if (!saved) { showLogin(); return; }
  try {
    // Firebase persists custom-token auth in IndexedDB automatically.
    // Wait for the SDK to restore the persisted session before trying the (possibly
    // expired) raw custom token — custom tokens are only valid for 1 hour from issue,
    // but Firebase ID tokens auto-refresh silently while the session is alive.
    const persistedUser = await new Promise(res => {
      const unsub = onAuthStateChanged(auth, user => { unsub(); res(user); });
    });

    if (persistedUser) {
      // Firebase already has a valid session — no need to re-sign-in.
      _driver = { ...saved, agentId: persistedUser.uid };
    } else {
      // Session not persisted (e.g. IndexedDB cleared). Fall back to the saved token.
      // This only works within the 1-hour custom-token window.
      await signInWithCustomToken(auth, saved.token);
      _driver = saved;
    }
    saveSession(_driver); // refresh the 8-hour localStorage TTL
    showApp();
  } catch { clearSession(); showLogin(); }
})();

// ── Session Helpers ────────────────────────────────────────────
function saveSession(d) { try{localStorage.setItem(SESSION_KEY,JSON.stringify(d));}catch{} }
function loadSession() {
  try{
    const d=JSON.parse(localStorage.getItem(SESSION_KEY));
    if (!d||Date.now()-d.ts>SESSION_TTL){clearSession();return null;}
    return d;
  }catch{return null;}
}
function clearSession() { try{localStorage.removeItem(SESSION_KEY);}catch{} }

// ── Login ──────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const agentId = document.getElementById('agentIdInput').value.trim();
  const pin     = document.getElementById('pinInput').value.trim();
  const errEl   = document.getElementById('loginError');
  const btn     = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!agentId || !pin) { errEl.textContent = 'أدخل رقم المعرّف والرقم السري'; return; }
  btn.disabled = true; btn.textContent = 'جارٍ التحقق…';
  try {
    const res  = await fetch(`${VERCEL_API}/api/agent-login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ agentId, passcode: pin }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'فشل تسجيل الدخول');

    await signInWithCustomToken(auth, data.token);
    _driver = { agentId: data.agentId, displayName: data.displayName, token: data.token, ts: Date.now() };
    saveSession(_driver);
    showApp();
  } catch(err) {
    errEl.textContent = err.message === 'Failed to fetch'
      ? 'تعذّر الاتصال بالخادم. تحقق من الإنترنت.'
      : (err.message || 'بيانات غير صحيحة');
  } finally { btn.disabled=false; btn.textContent='تسجيل الدخول'; }
});

// ── App Shell ──────────────────────────────────────────────────
function showLogin() {
  document.getElementById('loginScreen').hidden = false;
  document.getElementById('appShell').hidden    = true;
}

function showApp() {
  document.getElementById('loginScreen').hidden = true;
  document.getElementById('appShell').hidden    = false;
  document.getElementById('topbarUser').textContent = `السائق: ${_driver.displayName}`;
  startOrdersListener();
}

async function doLogout() {
  if (!confirm('هل تريد تسجيل الخروج؟')) return;
  if (_ordersUnsub) { _ordersUnsub(); _ordersUnsub=null; }
  clearSession(); _driver=null;
  showLogin();
}

// ── Live Orders Listener ───────────────────────────────────────
function startOrdersListener() {
  if (_ordersUnsub) { _ordersUnsub(); }
  const uid = auth.currentUser?.uid; // = agentId
  if (!uid) return;

  const q = query(
    collection(db, 'orders'),
    where('assignedAgentId', '==', uid),
    where('status', 'in', ['assigned', 'in_transit']),
    orderBy('createdAt', 'desc'),
  );

  _ordersUnsub = onSnapshot(q, snap => {
    if (snap.metadata.hasPendingWrites) return;
    renderOrders(snap.docs);
  }, err => {
    console.error('orders listener:', err);
    document.getElementById('ordersContainer').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">خطأ في الاتصال</div><div class="empty-sub">${err.message}</div></div>`;
  });
}

// ── Render ─────────────────────────────────────────────────────
function renderOrders(docs) {
  const assigned   = docs.filter(d => d.data().status==='assigned').length;
  const inTransit  = docs.filter(d => d.data().status==='in_transit').length;
  const todayDelivered = loadTodayDelivered(); // from localStorage
  document.getElementById('sumAssigned').textContent  = assigned;
  document.getElementById('sumTransit').textContent   = inTransit;
  document.getElementById('sumDelivered').textContent = todayDelivered;

  const el = document.getElementById('ordersContainer');
  if (!docs.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✅</div>
      <div class="empty-title">لا توجد طلبات نشطة</div>
      <div class="empty-sub">سيظهر هنا أي طلب يتم تعيينه لك</div>
    </div>`;
    return;
  }
  el.innerHTML = `<div class="orders-list">${docs.map(d => orderCardHTML(d.id, d.data())).join('')}</div>`;
}

function orderCardHTML(id, o) {
  const chipClass = o.status==='assigned' ? 'chip-assigned' : 'chip-in_transit';
  const chipText  = o.status==='assigned' ? 'معيّن' : 'في الطريق';
  const phone = o.customer?.phone || '';
  const canStart   = o.status==='assigned';
  const canDeliver = o.status==='in_transit';
  const canFail    = o.status==='in_transit';

  return `<div class="order-card">
    <div class="order-card-top">
      <div class="order-name">${esc(o.shopifyOrderName)}</div>
      <span class="status-chip ${chipClass}">${chipText}</span>
    </div>
    <div class="order-card-body">
      <div class="detail-row"><span class="detail-icon">👤</span><span class="detail-text">${esc(o.customer?.firstName)} ${esc(o.customer?.lastName)}</span></div>
      <div class="detail-row"><span class="detail-icon">📍</span><span class="detail-text">${esc(o.shippingAddress?.address1)}${o.shippingAddress?.address2?'، '+esc(o.shippingAddress.address2):''}, ${esc(o.shippingAddress?.city)}</span></div>
      ${o.toArea?`<div class="detail-row"><span class="detail-icon">🗺️</span><span class="detail-text muted">${esc(o.toArea)}</span></div>`:''}
      ${phone?`<div class="detail-row"><span class="detail-icon">📞</span><span class="detail-text" dir="ltr">${esc(phone)}</span></div>`:''}
      ${o.note?`<div class="detail-row"><span class="detail-icon">📝</span><span class="detail-text muted">${esc(o.note)}</span></div>`:''}
    </div>
    <div class="order-card-actions">
      ${phone?`<button class="action-btn btn-call" onclick="callCustomer('${esc(phone)}')">📞 اتصال</button>`:''}
      ${canStart?`<button class="action-btn btn-transit" onclick="startDelivery('${id}','${esc(o.shopifyOrderName)}')">🚗 انطلاق</button>`:''}
      ${canDeliver?`<button class="action-btn btn-deliver" onclick="openDeliverModal('${id}','${esc(o.shopifyOrderName)}')">✅ تم التسليم</button>`:''}
      ${canFail?`<button class="action-btn btn-fail" onclick="openFailModal('${id}','${esc(o.shopifyOrderName)}')">❌ فشل</button>`:''}
    </div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────────
function callCustomer(phone) {
  window.open(`tel:${phone}`, '_self');
}

async function startDelivery(orderId, orderName) {
  if (!confirm(`بدء توصيل الطلب ${orderName}؟`)) return;
  try {
    const batch = writeBatch(db);
    batch.update(doc(db,'orders',orderId), { status:'in_transit', updatedAt:serverTimestamp() });
    batch.update(doc(db,'dailyStats',todayStr()), { assigned:increment(-1), in_transit:increment(1), lastUpdatedAt:serverTimestamp() });
    await batch.commit();
    showToast('الطلب في الطريق 🚗','t-success');
  } catch(err) { console.error(err); showToast('فشل التحديث. حاول مرة أخرى.','t-error'); }
}

// ── Deliver Modal ──────────────────────────────────────────────
function openDeliverModal(orderId, orderName) {
  _pendingOrderId = orderId;
  document.getElementById('deliverPhotoUrl').value = '';
  document.getElementById('deliverError').textContent = '';
  document.getElementById('confirmDeliverBtn').disabled = false;
  document.getElementById('confirmDeliverBtn').textContent = 'تأكيد التسليم';
  document.getElementById('modalDeliver').hidden = false;
}
function closeDeliverModal() { document.getElementById('modalDeliver').hidden=true; _pendingOrderId=null; }

async function confirmDeliver() {
  const photoUrl = document.getElementById('deliverPhotoUrl').value.trim();
  const errEl    = document.getElementById('deliverError');
  errEl.textContent = '';
  const btn = document.getElementById('confirmDeliverBtn');
  btn.disabled=true; btn.textContent='جارٍ الحفظ…';
  try {
    const uid  = auth.currentUser.uid;
    const now  = serverTimestamp();
    const logId = `${_pendingOrderId}_${Date.now()}`;
    const batch = writeBatch(db);

    batch.update(doc(db,'orders',_pendingOrderId),{status:'delivered',deliveredAt:now,deliveryPhotoUrl:photoUrl||null,updatedAt:now});
    batch.update(doc(db,'dailyStats',todayStr()),{in_transit:increment(-1),delivered:increment(1),lastUpdatedAt:now});
    batch.set(doc(db,'deliveryLogs',logId),{logId,orderId:_pendingOrderId,agentId:uid,agentName:_driver.displayName,batchId:null,outcome:'delivered',failureReason:null,photoUrl:photoUrl||null,gpsLat:null,gpsLng:null,timestamp:now,createdAt:now});
    batch.update(doc(db,'agents',uid),{todayDeliveries:increment(1),totalDeliveries:increment(1),lastSeenAt:now});

    await batch.commit();
    incrementTodayDelivered();
    showToast('تم التسليم بنجاح ✅','t-success');
    closeDeliverModal();
  } catch(err) {
    console.error(err); errEl.textContent='فشل التسجيل. حاول مرة أخرى.';
    btn.disabled=false; btn.textContent='تأكيد التسليم';
  }
}

// ── Fail Modal ─────────────────────────────────────────────────
function openFailModal(orderId, orderName) {
  _pendingOrderId = orderId;
  document.getElementById('failReason').value = '';
  document.getElementById('failNote').value   = '';
  document.getElementById('failError').textContent = '';
  document.getElementById('failNoteLabel').hidden  = true;
  document.getElementById('failNote').hidden       = true;
  document.getElementById('confirmFailBtn').disabled = false;
  document.getElementById('confirmFailBtn').textContent = 'تأكيد الفشل';
  document.getElementById('modalFail').hidden = false;
}
function closeFailModal() { document.getElementById('modalFail').hidden=true; _pendingOrderId=null; }

// Show note field when "other" is selected
document.getElementById('failReason').addEventListener('change', e => {
  const isOther = e.target.value === 'other';
  document.getElementById('failNoteLabel').hidden = !isOther;
  document.getElementById('failNote').hidden      = !isOther;
});

async function confirmFail() {
  const reason = document.getElementById('failReason').value;
  const note   = document.getElementById('failNote').value.trim();
  const errEl  = document.getElementById('failError');
  errEl.textContent = '';
  if (!reason) { errEl.textContent='يرجى اختيار سبب الفشل.'; return; }
  const btn = document.getElementById('confirmFailBtn');
  btn.disabled=true; btn.textContent='جارٍ الحفظ…';
  try {
    const uid    = auth.currentUser.uid;
    const now    = serverTimestamp();
    const logId  = `${_pendingOrderId}_${Date.now()}`;
    const fullReason = reason==='other' && note ? note : reason;
    const batch  = writeBatch(db);

    batch.update(doc(db,'orders',_pendingOrderId),{status:'failed',failedAt:now,failureReason:fullReason,updatedAt:now});
    batch.update(doc(db,'dailyStats',todayStr()),{in_transit:increment(-1),failed:increment(1),lastUpdatedAt:now});
    batch.set(doc(db,'deliveryLogs',logId),{logId,orderId:_pendingOrderId,agentId:uid,agentName:_driver.displayName,batchId:null,outcome:'failed',failureReason:fullReason,photoUrl:null,gpsLat:null,gpsLng:null,timestamp:now,createdAt:now});
    batch.update(doc(db,'agents',uid),{lastSeenAt:now});

    await batch.commit();
    showToast('تم تسجيل الفشل','t-error');
    closeFailModal();
  } catch(err) {
    console.error(err); errEl.textContent='فشل التسجيل. حاول مرة أخرى.';
    btn.disabled=false; btn.textContent='تأكيد الفشل';
  }
}

// ── Today's delivered count (localStorage counter) ────────────
function loadTodayDelivered() {
  try {
    const k=`bloom_driver_delivered_${todayStr()}`;
    return parseInt(localStorage.getItem(k)||'0');
  } catch{return 0;}
}
function incrementTodayDelivered() {
  try {
    const k=`bloom_driver_delivered_${todayStr()}`;
    localStorage.setItem(k, String((parseInt(localStorage.getItem(k)||'0'))+1));
  } catch{}
}

// ── Utilities ──────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function esc(str) {
  if (str==null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
let _toastTimer;
function showToast(msg,type='',ms=3000) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=type||'';
  requestAnimationFrame(()=>el.classList.add('show'));
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

// Backdrop dismiss
['modalDeliver','modalFail'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{ if(e.target===e.currentTarget) document.getElementById(id).hidden=true; });
});

Object.assign(window,{doLogout,startDelivery,callCustomer,openDeliverModal,closeDeliverModal,confirmDeliver,openFailModal,closeFailModal,confirmFail});
</script>
</body>
</html>
