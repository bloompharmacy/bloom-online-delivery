<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bloom:        #b22025;
      --bloom-dark:   #8a1a1e;
      --bloom-light:  #fdf2f2;
      --surface:      #ffffff;
      --bg:           #f3f4f8;
      --text:         #111827;
      --text-muted:   #6b7280;
      --border:       #e5e7eb;
      --radius:       10px;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.08);
      --shadow-md:    0 4px 12px rgba(0,0,0,.12);
      --transition:   .18s ease;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1,h2,h3,h4 { font-family: 'Sora', sans-serif; }
    button { cursor: pointer; font-family: inherit; }
    input, select { font-family: inherit; }
    a { color: var(--bloom); }

    /* ── Login Screen ─────────────────────────────────────── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: var(--bg);
    }
    .login-card {
      background: var(--surface); border-radius: 16px;
      box-shadow: var(--shadow-md); padding: 48px 40px;
      width: 100%; max-width: 380px; text-align: center;
    }
    .login-logo { font-size: 48px; margin-bottom: 12px; }
    .login-card h1 { font-size: 28px; color: var(--bloom); margin-bottom: 4px; }
    .login-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .login-card input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: var(--radius); font-size: 18px; text-align: center;
      letter-spacing: 6px; outline: none; transition: border-color var(--transition);
      margin-bottom: 16px;
    }
    .login-card input:focus { border-color: var(--bloom); }
    .login-card button[type=submit] {
      width: 100%; padding: 13px; background: var(--bloom); color: #fff;
      border: none; border-radius: var(--radius); font-size: 15px;
      font-weight: 600; transition: background var(--transition);
    }
    .login-card button[type=submit]:hover { background: var(--bloom-dark); }
    .login-card button[type=submit]:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg { color: #dc2626; font-size: 13px; margin-top: 12px; min-height: 18px; }

    /* ── Navbar ───────────────────────────────────────────── */
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px; height: 60px; position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .nav-brand { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--bloom); font-size: 18px; margin-right: 12px; white-space: nowrap; }
    .nav-tabs { display: flex; gap: 2px; flex: 1; }
    .nav-tab {
      padding: 8px 16px; border: none; background: transparent;
      color: var(--text-muted); border-radius: 8px;
      font-size: 14px; font-weight: 500; transition: all var(--transition);
    }
    .nav-tab:hover { background: var(--bg); color: var(--text); }
    .nav-tab.active { background: var(--bloom-light); color: var(--bloom); font-weight: 600; }
    .nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .nav-user { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .btn-logout {
      padding: 6px 14px; border: 1.5px solid var(--border); background: transparent;
      border-radius: 8px; font-size: 13px; color: var(--text-muted);
      transition: all var(--transition);
    }
    .btn-logout:hover { border-color: var(--bloom); color: var(--bloom); }

    /* ── Tab Content ──────────────────────────────────────── */
    .tab-content { padding: 24px 20px; max-width: 1100px; margin: 0 auto; }

    /* ── KPI Cards ────────────────────────────────────────── */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px 22px; box-shadow: var(--shadow-sm);
      border-left: 4px solid var(--border);
    }
    .kpi-card.bloom   { border-left-color: var(--bloom); }
    .kpi-card.orange { border-left-color: #f97316; }
    .kpi-card.green   { border-left-color: #16a34a; }
    .kpi-card.blue   { border-left-color: #2563eb; }
    .kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .kpi-value { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); }

    /* ── Section Headers ──────────────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .section-count { font-size: 13px; color: var(--text-muted); }

    /* ── Filter Bar ───────────────────────────────────────── */
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-pill {
      padding: 6px 14px; border: 1.5px solid var(--border); background: var(--surface);
      border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text-muted);
      transition: all var(--transition);
    }
    .filter-pill:hover { border-color: var(--bloom); color: var(--bloom); }
    .filter-pill.active { background: var(--bloom); border-color: var(--bloom); color: #fff; font-weight: 600; }

    /* ── Order Cards ──────────────────────────────────────── */
    .orders-list { display: flex; flex-direction: column; gap: 10px; }
    .order-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); overflow: hidden;
      border: 1px solid var(--border); transition: box-shadow var(--transition);
    }
    .order-card:hover { box-shadow: var(--shadow-md); }
    .order-card-head {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .order-num { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; }
    .order-badge {
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge-pending    { background: #fff3cd; color: #92400e; }
    .badge-assigned   { background: #dbeafe; color: #1e40af; }
    .badge-in_transit { background: #ede9fe; color: #5b21b6; }
    .badge-delivered  { background: #dcfce7; color: #15803d; }
    .badge-failed     { background: #fee2e2; color: #991b1b; }
    .badge-cancelled  { background: #f3f4f6; color: #6b7280; }
    .order-time { font-size: 12px; color: var(--text-muted); margin-left: auto; }
    .order-card-body { padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
    .info-row { display: flex; flex-direction: column; gap: 1px; }
    .info-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
    .info-val { font-size: 13px; color: var(--text); }
    .fee-missing { color: #f97316; font-weight: 600; }
    .unassigned { color: var(--text-muted); font-style: italic; }
    .order-note { grid-column: 1/-1; font-size: 12px; color: var(--text-muted); background: #fffbeb; padding: 6px 8px; border-radius: 6px; }
    .order-card-actions {
      padding: 10px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    /* Dashboard quick order row */
    .dash-order-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background var(--transition);
    }
    .dash-order-row:last-child { border-bottom: none; }
    .dash-order-row:hover { background: var(--bg); }
    .dash-order-num { font-weight: 700; font-size: 14px; min-width: 60px; }
    .dash-order-info { flex: 1; }
    .dash-order-name { font-size: 13px; font-weight: 500; }
    .dash-order-addr { font-size: 12px; color: var(--text-muted); }
    .dash-order-time { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn-sm {
      padding: 6px 14px; border-radius: 7px; font-size: 13px;
      font-weight: 600; border: none; transition: all var(--transition);
    }
    .btn-primary { background: var(--bloom); color: #fff; }
    .btn-primary:hover { background: var(--bloom-dark); }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { border-color: var(--bloom); color: var(--bloom); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { color: var(--text); }
    .btn-danger { background: #fee2e2; color: #991b1b; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm:disabled { opacity: .5; cursor: not-allowed; }
    .btn-assign-sm {
      padding: 5px 12px; background: var(--bloom); color: #fff;
      border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
      white-space: nowrap; transition: background var(--transition);
    }
    .btn-assign-sm:hover { background: var(--bloom-dark); }

    /* ── Drivers Tab ──────────────────────────────────────── */
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .agent-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    }
    .agent-card.inactive { opacity: .55; }
    .agent-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .agent-phone { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .agent-status { font-size: 12px; margin-bottom: 4px; }
    .agent-stats { font-size: 12px; color: var(--text-muted); }

    /* ── Fees Tab ─────────────────────────────────────────── */
    .fee-lookup-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 22px; box-shadow: var(--shadow-sm); margin-bottom: 24px;
    }
    .fee-lookup-card h3 { font-size: 15px; margin-bottom: 14px; }
    .fee-lookup-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .fee-lookup-row .form-group { flex: 1; min-width: 180px; }
    .fee-result { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 700; color: var(--bloom); margin-top: 4px; }

    /* ── Modals ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 16px;
    }
    .modal-card {
      background: var(--surface); border-radius: 14px;
      box-shadow: var(--shadow-md); width: 100%; max-width: 440px;
      overflow: hidden;
    }
    .modal-header {
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; }
    .modal-close {
      background: none; border: none; font-size: 20px; color: var(--text-muted);
      padding: 4px 8px; border-radius: 6px; transition: all var(--transition);
    }
    .modal-close:hover { background: var(--bg); color: var(--text); }
    .modal-body { padding: 22px; }
    .modal-footer {
      padding: 14px 22px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .modal-btn {
      padding: 10px 22px; border-radius: 8px; font-size: 14px;
      font-weight: 600; border: none; transition: all var(--transition);
    }
    .modal-btn-primary { background: var(--bloom); color: #fff; }
    .modal-btn-primary:hover { background: var(--bloom-dark); }
    .modal-btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .modal-btn-cancel { background: var(--bg); color: var(--text-muted); }
    .modal-btn-cancel:hover { color: var(--text); }

    /* ── Form Elements ────────────────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
    .form-control {
      padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color var(--transition);
      background: var(--surface); width: 100%;
    }
    .form-control:focus { border-color: var(--bloom); }
    .fee-display-box {
      background: var(--bloom-light); border: 2px solid var(--bloom);
      border-radius: 10px; padding: 16px; text-align: center; margin: 4px 0 0;
    }
    .fee-display-label { font-size: 12px; color: var(--bloom); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .fee-display-val { font-family: 'Sora', sans-serif; font-size: 30px; font-weight: 700; color: var(--bloom); line-height: 1.2; }

    /* ── Misc ─────────────────────────────────────────────── */
    .empty-state { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px; }
    .loading { text-align: center; color: var(--text-muted); padding: 32px; font-size: 14px; }
    .card-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); overflow: hidden; }
    .modal-error { color: #dc2626; font-size: 13px; margin-top: 8px; min-height: 18px; }
    .tag-info { display: inline-block; background: var(--bg); color: var(--text-muted); border-radius: 4px; font-size: 11px; padding: 2px 6px; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1f2937; color: #fff; padding: 12px 24px;
      border-radius: 10px; font-size: 14px; font-weight: 500;
      z-index: 2000; opacity: 0; transition: all .3s ease; white-space: nowrap;
      box-shadow: var(--shadow-md);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.toast-success { background: #15803d; }
    #toast.toast-error   { background: #dc2626; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 0 12px; }
      .nav-brand { font-size: 16px; }
      .nav-tab { padding: 7px 10px; font-size: 13px; }
      .tab-content { padding: 16px 12px; }
      .order-card-body { grid-template-columns: 1fr; }
      .kpi-value { font-size: 22px; }
      .modal-card { max-width: 100%; }
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🌸</div>
    <h1>Bloom</h1>
    <p class="login-sub">Online Store Dashboard</p>
    <form id="loginForm" autocomplete="off">
      <input id="passcodeInput" type="password" placeholder="Passcode" maxlength="20" autofocus>
      <button type="submit" id="loginBtn">Sign In</button>
    </form>
    <p id="loginError" class="error-msg"></p>
  </div>
</div>

<div id="appShell" hidden>

  <nav>
    <div class="nav-brand">🌸 Bloom</div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="dashboard" onclick="activateTab('dashboard')">Dashboard</button>
      <button class="nav-tab"        data-tab="orders"    onclick="activateTab('orders')">Orders</button>
      <button class="nav-tab"        data-tab="fees"      onclick="activateTab('fees')">Fees</button>
      <button class="nav-tab"        data-tab="drivers"   onclick="activateTab('drivers')">Drivers</button>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="tab-content" id="tab-dashboard">
    <div class="kpi-grid">
      <div class="kpi-card bloom">
        <div class="kpi-label">Total Today</div>
        <div class="kpi-value" id="kpiTotal">—</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-label">Pending</div>
        <div class="kpi-value" id="kpiPending">—</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Delivered</div>
        <div class="kpi-value" id="kpiDelivered">—</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Shipping Revenue</div>
        <div class="kpi-value" id="kpiRevenue">—</div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">⏳ Pending Orders</span>
      <span class="section-count" id="dashPendingCount"></span>
    </div>
    <div class="card-wrap">
      <div id="dashPendingList"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-orders" hidden>
    <div class="filter-bar">
      <button class="filter-pill active" data-status="all"        onclick="setStatusFilter('all')">All</button>
      <button class="filter-pill"        data-status="pending"    onclick="setStatusFilter('pending')">Pending</button>
      <button class="filter-pill"        data-status="assigned"   onclick="setStatusFilter('assigned')">Assigned</button>
      <button class="filter-pill"        data-status="in_transit" onclick="setStatusFilter('in_transit')">In Transit</button>
      <button class="filter-pill"        data-status="delivered"  onclick="setStatusFilter('delivered')">Delivered</button>
      <button class="filter-pill"        data-status="failed"     onclick="setStatusFilter('failed')">Failed</button>
      <button class="filter-pill"        data-status="cancelled"  onclick="setStatusFilter('cancelled')">Cancelled</button>
    </div>
    <div class="section-header">
      <span class="section-title">Orders</span>
      <span class="section-count" id="ordersCount"></span>
    </div>
    <div class="orders-list" id="ordersListEl">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <div class="tab-content" id="tab-fees" hidden>
    <div class="fee-lookup-card">
      <h3>Quick Fee Lookup</h3>
      <div class="fee-lookup-row">
        <div class="form-group">
          <label class="form-label">From Area</label>
          <select class="form-control" id="lookupFrom" onchange="calcLookupFee()">
            <option value="">— Select —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">To Area</label>
          <select class="form-control" id="lookupTo" onchange="calcLookupFee()">
            <option value="">— Select —</option>
          </select>
        </div>
        <div class="form-group" style="min-width:120px">
          <label class="form-label">Fee</label>
          <div class="fee-result" id="lookupResult">—</div>
        </div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">Delivered Orders — Missing Shipping Fee</span>
      <span class="section-count" id="feesCount"></span>
    </div>
    <div class="orders-list" id="feesListEl">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <div class="tab-content" id="tab-drivers" hidden>
    <div class="section-header">
      <span class="section-title">Delivery Drivers</span>
      <span class="section-count" id="driversCount"></span>
    </div>
    <div class="agents-grid" id="driversListEl">
      <div class="loading">Loading…</div>
    </div>
  </div>

</div><div class="modal-overlay" id="modalAssign" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">Assign Driver — <span id="assignOrderLabel"></span></span>
      <button class="modal-close" onclick="closeAssignModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Select Driver</label>
        <select class="form-control" id="assignDriverSelect">
          <option value="">— Loading drivers… —</option>
        </select>
      </div>
      <p class="modal-error" id="assignError"></p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeAssignModal()">Cancel</button>
      <button class="modal-btn modal-btn-primary" id="confirmAssignBtn" onclick="confirmAssign()">Confirm</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalFee" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">Assign Shipping Fee — <span id="feeOrderLabel"></span></span>
      <button class="modal-close" onclick="closeFeeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">From Area (Pickup / Branch)</label>
        <select class="form-control" id="feeFromArea" onchange="recalcFee()">
          <option value="">— Select area —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">To Area (Customer)</label>
        <select class="form-control" id="feeToArea" onchange="recalcFee()">
          <option value="">— Select area —</option>
        </select>
      </div>
      <div class="fee-display-box">
        <div class="fee-display-label">Calculated Shipping Fee</div>
        <div class="fee-display-val" id="feeDisplayVal">—</div>
      </div>
      <p class="modal-error" id="feeError"></p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeFeeModal()">Cancel</button>
      <button class="modal-btn modal-btn-primary" id="confirmFeeBtn" onclick="confirmFee()">Confirm Fee</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, doc, collection,
  getDoc, getDocs, setDoc, updateDoc, deleteDoc,
  query, where, orderBy, limit, onSnapshot,
  writeBatch, increment, serverTimestamp, Timestamp,
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ─────────────────────────────────────────────────────────────
// Firebase Config
// ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBnotQTRCsolWRY8OkQUjb68RV6N-alZg4",
  authDomain: "bloom-online-delivery.firebaseapp.com",
  projectId: "bloom-online-delivery",
  storageBucket: "bloom-online-delivery.firebasestorage.app",
  messagingSenderId: "1083336380275",
  appId: "1:1083336380275:web:a8e80a8e4de6e6a40ebf06",
  measurementId: "G-VPT8W9WNHF"
};

// ── Constants ──────────────────────────────────────────────────────────────
const SESSION_KEY  = 'bloom_rc_admin';
const MATRIX_KEY   = 'bloom_rc_shippingMatrix';
const AREAS_KEY    = 'bloom_rc_deliveryAreas';
const TTL_30M      = 30 * 60 * 1000;
const TTL_5M       =  5 * 60 * 1000;

const CLUSTER_LABELS = {
  western:'West Cairo', northern:'North Cairo', southern:'South Cairo',
  eastern:'East Cairo', october:'6th October / Pyramids',
  sheikh_zayed:'Sheikh Zayed', new_cairo:'New Cairo', outer:'Outer Areas',
};
const STATUS_LABELS = {
  pending:'Pending', assigned:'Assigned', in_transit:'In Transit',
  delivered:'Delivered', failed:'Failed', cancelled:'Cancelled',
};

// ── State ──────────────────────────────────────────────────────────────────
let db, auth;
let _user         = null;   // { userId, role, displayName, uid, ts }
let _matrixCache  = null;
let _areasCache   = null;
let _agentsCache  = null;
let _activeTab    = 'dashboard';
let _statusFilter = 'all';
let _ordersUnsub  = null;
let _statsUnsub   = null;
const _mem = new Map();     // 5-min in-memory cache

// ── Two-Layer Cache ────────────────────────────────────────────────────────
function lsGet(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > TTL_30M) { localStorage.removeItem(key); return null; }
    return data;
  } catch { return null; }
}
function lsSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}
function memGet(key) {
  const e = _mem.get(key);
  if (!e) return null;
  if (Date.now() - e.ts > TTL_5M) { _mem.delete(key); return null; }
  return e.data;
}
function memSet(key, data) { _mem.set(key, { ts: Date.now(), data }); }

// ── Init ───────────────────────────────────────────────────────────────────
const _app = initializeApp(firebaseConfig);
db   = getFirestore(_app);
auth = getAuth(_app);

async function initApp() {
  await signInAnonymously(auth).catch(() => {});
  const session = lsGet(SESSION_KEY);
  if (session && Date.now() - session.ts < 8 * 3600_000) {
    _user = session;
    showApp();
  } else {
    showLogin();
  }
}
initApp();

// ── Login ──────────────────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const passcode = document.getElementById('passcodeInput').value.trim();
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await doLogin(passcode);
  } catch (err) {
    errEl.textContent = err.message || 'Invalid passcode';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});

async function doLogin(passcode) {
  const snap = await getDoc(doc(db, 'config', 'staffPasscodes'));
  if (!snap.exists()) throw new Error('System not configured — add /config/staffPasscodes to Firestore.');

  const match = (snap.data().codes || {})[passcode];
  if (!match) throw new Error('Invalid passcode. Please try again.');

  // Write /sessions/{uid} so Firestore rules recognise this UID as staff
  const uid = auth.currentUser.uid;
  await setDoc(doc(db, 'sessions', uid), {
    userId: match.userId, role: match.role,
    displayName: match.displayName, createdAt: serverTimestamp(),
  });

  _user = { ...match, uid, ts: Date.now() };
  lsSet(SESSION_KEY, _user);
  showApp();
}

async function logout() {
  if (!confirm('Sign out?')) return;
  teardown();
  if (auth.currentUser?.uid)
    await deleteDoc(doc(db, 'sessions', auth.currentUser.uid)).catch(() => {});
  localStorage.removeItem(SESSION_KEY);
  _user = null;
  showLogin();
}

// ── UI Shell ───────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('loginScreen').hidden = false;
  document.getElementById('appShell').hidden    = true;
  document.getElementById('passcodeInput').value = '';
}
function showApp() {
  document.getElementById('loginScreen').hidden = true;
  document.getElementById('appShell').hidden    = false;
  document.getElementById('navUser').textContent = _user.displayName;
  loadMatrix();   // warm cache in background
  loadAreas();
  activateTab('dashboard');
}

function teardown() {
  if (_ordersUnsub) { _ordersUnsub(); _ordersUnsub = null; }
  if (_statsUnsub)  { _statsUnsub();  _statsUnsub  = null; }
}

document.addEventListener('visibilitychange', () => {
  if (!_user) return;
  if (document.hidden) { teardown(); }
  else {
    if (_activeTab === 'dashboard') setupDashboard();
    if (_activeTab === 'orders')    setupOrders();
  }
});

// ── Tab Navigation ─────────────────────────────────────────────────────────
function activateTab(tab) {
  teardown();
  _activeTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.hidden = true);
  document.getElementById(`tab-${tab}`).hidden = false;

  if (tab === 'dashboard') setupDashboard();
  if (tab === 'orders')    setupOrders();
  if (tab === 'fees')      setupFees();
  if (tab === 'drivers')   loadDriversTab();
}

// ══════════════════════════════════════════════════════════════
// DASHBOARD TAB
// ══════════════════════════════════════════════════════════════
function setupDashboard() {
  setupStatsLive();
  setupPendingLive();
}

function setupStatsLive() {
  if (_statsUnsub) return;
  _statsUnsub = onSnapshot(doc(db, 'dailyStats', todayStr()), snap => {
    renderKPIs(snap.exists() ? snap.data() : null);
  });
}

function renderKPIs(s) {
  const fmt = v => (v || 0).toLocaleString();
  document.getElementById('kpiTotal').textContent     = fmt(s?.totalOrders);
  document.getElementById('kpiPending').textContent   = fmt(s?.pending);
  document.getElementById('kpiDelivered').textContent = fmt(s?.delivered);
  document.getElementById('kpiRevenue').textContent   = `${fmt(s?.totalShippingFees)} EGP`;
}

function setupPendingLive() {
  const q = query(
    collection(db, 'orders'),
    where('status', '==', 'pending'),
    orderBy('createdAt', 'desc'),
    limit(15),
  );
  _ordersUnsub = onSnapshot(q, snap => {
    if (snap.metadata.hasPendingWrites) return;
    const docs = snap.docs;
    document.getElementById('dashPendingCount').textContent =
      docs.length ? `${docs.length} order${docs.length > 1 ? 's' : ''}` : '';
    const el = document.getElementById('dashPendingList');
    if (!docs.length) { el.innerHTML = '<div class="empty-state">No pending orders — all clear ✓</div>'; return; }
    el.innerHTML = docs.map(d => {
      const o = d.data();
      return `<div class="dash-order-row" onclick="activateTab('orders')">
        <div class="dash-order-num">${esc(o.shopifyOrderName)}</div>
        <div class="dash-order-info">
          <div class="dash-order-name">${esc(o.customer.firstName)} ${esc(o.customer.lastName)}</div>
          <div class="dash-order-addr">${esc(o.shippingAddress.address1)}, ${esc(o.shippingAddress.city)}</div>
        </div>
        <div class="dash-order-time">${timeAgo(o.createdAt?.toDate?.())}</div>
        <button class="btn-assign-sm" onclick="event.stopPropagation();openAssignModal('${d.id}','${esc(o.shopifyOrderName)}','${o.status}')">Assign</button>
      </div>`;
    }).join('');
  });
}

// ══════════════════════════════════════════════════════════════
// ORDERS TAB
// ══════════════════════════════════════════════════════════════
function setupOrders() {
  if (_ordersUnsub) { _ordersUnsub(); _ordersUnsub = null; }
  rebuildOrdersQuery();
}

function rebuildOrdersQuery() {
  const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
  let q;
  if (_statusFilter === 'all') {
    q = query(collection(db,'orders'),
      where('createdAt','>=', Timestamp.fromDate(todayMidnight)),
      orderBy('createdAt','desc'), limit(100));
  } else {
    q = query(collection(db,'orders'),
      where('status','==', _statusFilter),
      orderBy('createdAt','desc'), limit(100));
  }
  _ordersUnsub = onSnapshot(q, snap => {
    if (snap.metadata.hasPendingWrites) return;
    renderOrdersList(snap.docs);
  });
}

function renderOrdersList(docs) {
  document.getElementById('ordersCount').textContent =
    `${docs.length} order${docs.length !== 1 ? 's' : ''}`;
  const el = document.getElementById('ordersListEl');
  if (!docs.length) { el.innerHTML = '<div class="empty-state">No orders found.</div>'; return; }
  el.innerHTML = docs.map(d => orderCardHTML(d.id, d.data())).join('');
}

function orderCardHTML(id, o) {
  const fee    = o.shippingFee != null ? `${o.shippingFee} EGP` : `<span class="fee-missing">Not assigned</span>`;
  const driver = o.assignedAgentName
    ? esc(o.assignedAgentName)
    : `<span class="unassigned">Unassigned</span>`;
  const canAssign  = ['pending','assigned'].includes(o.status);
  const canFee       = o.shippingFee == null;
  const canCancel  = o.status === 'pending' && _user?.role === 'admin';
  return `<div class="order-card">
    <div class="order-card-head">
      <span class="order-num">${esc(o.shopifyOrderName)}</span>
      <span class="order-badge badge-${o.status}">${STATUS_LABELS[o.status] || o.status}</span>
      ${o.financialStatus ? `<span class="tag-info">${esc(o.financialStatus)}</span>` : ''}
      <span class="order-time">${timeAgo(o.createdAt?.toDate?.())}</span>
    </div>
    <div class="order-card-body">
      <div class="info-row">
        <span class="info-label">Customer</span>
        <span class="info-val">${esc(o.customer.firstName)} ${esc(o.customer.lastName)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Phone</span>
        <span class="info-val">${esc(o.customer.phone || '—')}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Address</span>
        <span class="info-val">${esc(o.shippingAddress.address1)}${o.shippingAddress.address2 ? ', '+esc(o.shippingAddress.address2):''}, ${esc(o.shippingAddress.city)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Order Total</span>
        <span class="info-val">${parseFloat(o.orderTotal||0).toLocaleString()} ${esc(o.currency||'EGP')}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Driver</span>
        <span class="info-val">${driver}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Shipping Fee</span>
        <span class="info-val">${fee}</span>
      </div>
      ${o.note ? `<div class="order-note">📝 ${esc(o.note)}</div>` : ''}
    </div>
    <div class="order-card-actions">
      ${canAssign ? `<button class="btn-sm btn-primary" onclick="openAssignModal('${id}','${esc(o.shopifyOrderName)}','${o.status}')">${o.assignedAgentId?'Reassign Driver':'Assign Driver'}</button>` : ''}
      ${canFee    ? `<button class="btn-sm btn-secondary" onclick="openFeeModal('${id}','${esc(o.shopifyOrderName)}','${esc(o.shippingAddress.city)}')">Assign Shipping Fee</button>` : ''}
      ${canCancel ? `<button class="btn-sm btn-danger" onclick="cancelOrder('${id}','${esc(o.shopifyOrderName)}','${o.status}')">Cancel Order</button>` : ''}
    </div>
  </div>`;
}

function setStatusFilter(status) {
  _statusFilter = status;
  document.querySelectorAll('.filter-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.status === status));
  if (_ordersUnsub) { _ordersUnsub(); _ordersUnsub = null; }
  rebuildOrdersQuery();
}

// ══════════════════════════════════════════════════════════════
// ASSIGN DRIVER MODAL
// ══════════════════════════════════════════════════════════════
let _assignId = null, _assignOldStatus = null;

async function openAssignModal(orderId, orderName, currentStatus) {
  _assignId = orderId; _assignOldStatus = currentStatus;
  document.getElementById('assignOrderLabel').textContent = orderName;
  document.getElementById('assignError').textContent = '';
  document.getElementById('confirmAssignBtn').disabled = false;
  document.getElementById('confirmAssignBtn').textContent = 'Confirm';

  const agents = await loadAgents();
  const select = document.getElementById('assignDriverSelect');
  select.innerHTML = '<option value="">— Select driver —</option>' +
    agents.filter(a => a.isActive).map(a =>
      `<option value="${esc(a.agentId)}" data-name="${esc(a.displayName)}">${esc(a.displayName)}</option>`
    ).join('');
  document.getElementById('modalAssign').hidden = false;
}

function closeAssignModal() {
  document.getElementById('modalAssign').hidden = true;
  _assignId = null;
}

async function confirmAssign() {
  const sel   = document.getElementById('assignDriverSelect');
  const aId   = sel.value;
  const aName = sel.selectedOptions[0]?.dataset.name;
  if (!aId) { document.getElementById('assignError').textContent = 'Please select a driver.'; return; }

  const btn = document.getElementById('confirmAssignBtn');
  btn.disabled = true; btn.textContent = 'Assigning…';

  try {
    const today = todayStr();
    const batch = writeBatch(db);

    batch.update(doc(db,'orders',_assignId), {
      assignedAgentId: aId, assignedAgentName: aName,
      assignedAt: serverTimestamp(), status: 'assigned',
      updatedAt: serverTimestamp(),
    });
    batch.update(doc(db,'dailyStats',today), {
      [_assignOldStatus]: increment(-1),
      assigned:           increment(1),
      lastUpdatedAt:      serverTimestamp(),
    });

    await batch.commit();
    showToast(`Assigned to ${aName}`,'success');
    closeAssignModal();
  } catch (err) {
    console.error(err);
    document.getElementById('assignError').textContent = 'Failed — please try again.';
    btn.disabled = false; btn.textContent = 'Confirm';
  }
}

// ══════════════════════════════════════════════════════════════
// SHIPPING FEE MODAL
// ══════════════════════════════════════════════════════════════
let _feeId = null, _feeName = null;

async function openFeeModal(orderId, orderName, cityHint) {
  _feeId = orderId; _feeName = orderName;
  document.getElementById('feeOrderLabel').textContent = orderName;
  document.getElementById('feeDisplayVal').textContent = '—';
  document.getElementById('feeError').textContent = '';
  document.getElementById('confirmFeeBtn').disabled = false;
  document.getElementById('confirmFeeBtn').textContent = 'Confirm Fee';

  const areas = await loadAreas();
  populateAreaSelect('feeFromArea', areas);
  populateAreaSelect('feeToArea',   areas);

  if (cityHint) {
    const sel = document.getElementById('feeToArea');
    const hit = [...sel.options].find(o =>
      o.value.toLowerCase().includes(cityHint.toLowerCase()) ||
      cityHint.toLowerCase().includes(o.value.toLowerCase().split(' ')[0])
    );
    if (hit) sel.value = hit.value;
  }
  recalcFee();
  document.getElementById('modalFee').hidden = false;
}

function closeFeeModal() {
  document.getElementById('modalFee').hidden = true;
  _feeId = null;
}

function recalcFee() {
  const from = document.getElementById('feeFromArea').value;
  const to   = document.getElementById('feeToArea').value;
  const fee  = (from && to) ? lookupFee(from, to) : null;
  document.getElementById('feeDisplayVal').textContent =
    fee != null ? `${fee} EGP` : (from && to ? 'Not found' : '—');
}

async function confirmFee() {
  const from = document.getElementById('feeFromArea').value;
  const to   = document.getElementById('feeToArea').value;
  const fee  = lookupFee(from, to);

  if (!from || !to) { document.getElementById('feeError').textContent = 'Select both areas.'; return; }
  if (fee == null)  { document.getElementById('feeError').textContent = 'No fee found for this route.'; return; }

  const btn = document.getElementById('confirmFeeBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const today = todayStr();
    const batch = writeBatch(db);

    batch.update(doc(db,'orders',_feeId), {
      fromArea: from, toArea: to, shippingFee: fee,
      feeAssignedBy: _user.userId, feeAssignedAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
    });
    batch.set(doc(db,'shippingPricing',_feeId), {
      orderId: _feeId, fromArea: from, toArea: to, shippingFee: fee,
      assignedBy: _user.userId, assignedAt: serverTimestamp(),
      matrixVersion: _matrixCache?.version || 1,
      isOverride: false, overrideReason: null,
    });
    batch.update(doc(db,'dailyStats',today), {
      totalShippingFees: increment(fee),
      lastUpdatedAt: serverTimestamp(),
    });

    await batch.commit();
    showToast(`Fee saved: ${fee} EGP (${from} → ${to})`, 'success');
    closeFeeModal();
  } catch (err) {
    console.error(err);
    document.getElementById('feeError').textContent = 'Failed — please try again.';
    btn.disabled = false; btn.textContent = 'Confirm Fee';
  }
}

// ══════════════════════════════════════════════════════════════
// FEES TAB
// ══════════════════════════════════════════════════════════════
async function setupFees() {
  const areas = await loadAreas();
  populateAreaSelect('lookupFrom', areas);
  populateAreaSelect('lookupTo',   areas);

  const el = document.getElementById('feesListEl');
  el.innerHTML = '<div class="loading">Loading…</div>';

  const snap = await getDocs(query(
    collection(db,'orders'),
    where('status','==','delivered'),
    orderBy('createdAt','desc'),
    limit(100),
  ));
  const missing = snap.docs.filter(d => d.data().shippingFee == null);
  document.getElementById('feesCount').textContent =
    missing.length ? `${missing.length} unpriced` : 'All priced ✓';

  if (!missing.length) {
    el.innerHTML = '<div class="empty-state">All delivered orders have shipping fees assigned ✓</div>';
    return;
  }
  el.innerHTML = missing.map(d => orderCardHTML(d.id, d.data())).join('');
}

function calcLookupFee() {
  const from = document.getElementById('lookupFrom').value;
  const to   = document.getElementById('lookupTo').value;
  const fee  = (from && to) ? lookupFee(from, to) : null;
  document.getElementById('lookupResult').textContent =
    fee != null ? `${fee} EGP` : (from && to ? 'Not found' : '—');
}

// ══════════════════════════════════════════════════════════════
// DRIVERS TAB
// ══════════════════════════════════════════════════════════════
async function loadDriversTab() {
  const el = document.getElementById('driversListEl');
  const cached = memGet('agents_full');
  const agents = cached || await loadAgents();

  document.getElementById('driversCount').textContent = `${agents.length} drivers`;
  el.innerHTML = agents.map(a => `
    <div class="agent-card ${a.isActive ? '' : 'inactive'}">
      <div class="agent-name">${esc(a.displayName)}</div>
      <div class="agent-phone">${esc(a.phone || '—')}</div>
      <div class="agent-status">${a.isActive ? '🟢 Active' : '🔴 Inactive'}</div>
      <div class="agent-stats">Today: ${a.todayDeliveries||0} · Total: ${a.totalDeliveries||0}</div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════════════
// CANCEL ORDER
// ══════════════════════════════════════════════════════════════
async function cancelOrder(orderId, orderName, oldStatus) {
  if (!confirm(`Cancel order ${orderName}? This cannot be undone.`)) return;
  const batch = writeBatch(db);
  batch.update(doc(db,'orders',orderId), { status:'cancelled', updatedAt:serverTimestamp() });
  batch.update(doc(db,'dailyStats',todayStr()), {
    [oldStatus]:  increment(-1),
    cancelled:    increment(1),
    lastUpdatedAt: serverTimestamp(),
  });
  await batch.commit();
  showToast(`${orderName} cancelled`);
}

// ══════════════════════════════════════════════════════════════
// DATA LOADERS (Cached)
// ══════════════════════════════════════════════════════════════
async function loadMatrix() {
  if (_matrixCache) return _matrixCache;
  const cached = lsGet(MATRIX_KEY);
  if (cached) { _matrixCache = cached; return _matrixCache; }
  const snap = await getDoc(doc(db,'config','shippingMatrix'));
  if (!snap.exists()) throw new Error('Shipping matrix not found. Run the seeder first.');
  _matrixCache = snap.data();
  lsSet(MATRIX_KEY, _matrixCache);
  return _matrixCache;
}

async function loadAreas() {
  if (_areasCache) return _areasCache;
  const cached = lsGet(AREAS_KEY);
  if (cached) { _areasCache = cached; return _areasCache; }
  const snap = await getDocs(collection(db,'deliveryAreas'));
  _areasCache = snap.docs.map(d => d.data()).sort((a,b) => a.sortOrder - b.sortOrder);
  lsSet(AREAS_KEY, _areasCache);
  return _areasCache;
}

async function loadAgents() {
  if (_agentsCache) return _agentsCache;
  const snap = await getDocs(query(collection(db,'agents'), orderBy('displayName')));
  _agentsCache = snap.docs.map(d => d.data());
  memSet('agents_full', _agentsCache);
  return _agentsCache;
}

function lookupFee(from, to) {
  return _matrixCache?.prices?.[from]?.[to] ?? null;
}

function populateAreaSelect(id, areas) {
  const sel = document.getElementById(id);
  const grouped = {};
  areas.forEach(a => {
    if (!a.isActive) return;
    (grouped[a.cluster] = grouped[a.cluster] || []).push(a);
  });
  sel.innerHTML = '<option value="">— Select area —</option>';
  Object.entries(grouped).forEach(([cluster, list]) => {
    const g = document.createElement('optgroup');
    g.label = CLUSTER_LABELS[cluster] || cluster;
    list.forEach(a => {
      const o = document.createElement('option');
      o.value = a.name; o.textContent = a.name;
      g.appendChild(o);
    });
    sel.appendChild(g);
  });
}

// ══════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════
function todayStr() { return new Date().toISOString().split('T')[0]; }

function timeAgo(date) {
  if (!date) return '';
  const m = Math.floor((Date.now() - date.getTime()) / 60000);
  if (m <  1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _toastTimer;
function showToast(msg, type = '', ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = type ? `toast-${type}` : '';
  el.style.display = 'block';
  requestAnimationFrame(() => el.classList.add('show'));
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.style.display = 'none', 300);
  }, ms);
}

// ── Close modals on backdrop click ─────────────────────────────
document.getElementById('modalAssign').addEventListener('click', e => { if (e.target===e.currentTarget) closeAssignModal(); });
document.getElementById('modalFee').addEventListener('click',    e => { if (e.target===e.currentTarget) closeFeeModal(); });

// ── Expose to inline onclick handlers ──────────────────────────
Object.assign(window, {
  activateTab, setStatusFilter, logout,
  openAssignModal, closeAssignModal, confirmAssign,
  openFeeModal, closeFeeModal, recalcFee, confirmFee,
  cancelOrder, calcLookupFee,
});
</script>
